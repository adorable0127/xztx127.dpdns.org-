<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人机验证 · 仅限机器人</title>
<style>
  :root{
    --void:#0a0c11; --panel:#0f131b; --panel-2:#131925;
    --line:#222a3a; --line-soft:#1a2130;
    --ink:#c7d0e0; --dim:#586079; --faint:#39415a;
    --amber:#ffb454; --amber-glow:rgba(255,180,84,.16);
    --mint:#54e7c0;  --mint-glow:rgba(84,231,192,.14);
    --red:#ff5d6c;   --red-glow:rgba(255,93,108,.14);
    --human:#ff9270; --human-glow:rgba(255,146,112,.16);
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","Cascadia Code","Fira Code",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:radial-gradient(1200px 800px at 50% -10%, #11151f 0%, var(--void) 60%), var(--void);
    color:var(--ink); font-family:var(--mono); -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center; padding:28px 18px; min-height:100%; overflow-x:hidden;
  }
  .device{
    width:100%; max-width:560px;
    background:linear-gradient(180deg,var(--panel) 0%, #0c1017 100%);
    border:1px solid var(--line); border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 30px 80px -40px #000;
    overflow:hidden; position:relative;
  }
  .device::after{
    content:""; position:absolute; left:0; right:0; top:0; height:2px;
    background:linear-gradient(90deg,transparent, var(--amber-glow), transparent);
    opacity:.5; animation:scan 7s linear infinite; pointer-events:none;
  }
  @keyframes scan{ 0%{transform:translateY(0)} 100%{transform:translateY(900px)} }

  .head{ display:flex; align-items:center; justify-content:space-between; padding:13px 18px; border-bottom:1px solid var(--line-soft); background:var(--panel-2); }
  .head .id{ display:flex; align-items:center; gap:9px; font-size:11px; letter-spacing:.16em; color:var(--dim); text-transform:uppercase; }
  .dot{ width:8px; height:8px; border-radius:50%; background:var(--amber); box-shadow:0 0 10px var(--amber); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.25} }
  .head .ver{ font-size:11px; letter-spacing:.14em; color:var(--faint); }

  .body{ padding:24px 22px 22px; }
  .title h1{ margin:0; font-size:30px; font-weight:700; letter-spacing:.04em; color:var(--ink); }
  .title .en{ margin-top:7px; font-size:11px; letter-spacing:.32em; text-transform:uppercase; color:var(--dim); }
  .title .tag{ margin-top:14px; font-size:12.5px; line-height:1.5; color:var(--amber); letter-spacing:.02em; }
  .title .tag .sub{ color:var(--faint); letter-spacing:.16em; font-size:10.5px; display:block; margin-top:3px; }

  /* signature meter */
  .meter{
    margin:22px 0 6px; border:1px solid var(--line-soft); border-radius:10px;
    background:repeating-linear-gradient(90deg, transparent 0 26px, rgba(255,255,255,.012) 26px 27px), #0a0e15;
    padding:16px 18px 14px; position:relative; transition:border-color .3s, box-shadow .3s;
  }
  .meter.active{ border-color:rgba(255,180,84,.4); box-shadow:0 0 0 1px var(--amber-glow), 0 0 40px -18px var(--amber); }
  .meter.pass{ border-color:rgba(84,231,192,.45); box-shadow:0 0 0 1px var(--mint-glow), 0 0 40px -18px var(--mint); }
  .meter.fail{ border-color:rgba(255,93,108,.45); box-shadow:0 0 0 1px var(--red-glow), 0 0 40px -18px var(--red); }
  .meter .row1{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
  .meter .label{ font-size:10px; letter-spacing:.18em; color:var(--dim); text-transform:uppercase; }
  .meter .status{ font-size:11px; letter-spacing:.14em; color:var(--amber); text-transform:uppercase; white-space:nowrap; }
  .meter.pass .status{ color:var(--mint) } .meter.fail .status{ color:var(--red) }
  .meter .read{ display:flex; align-items:baseline; gap:8px; margin-top:8px; font-variant-numeric:tabular-nums; }
  .meter .num{ font-size:44px; font-weight:700; line-height:1; letter-spacing:.01em; color:var(--amber); font-variant-numeric:tabular-nums; transition:color .25s; }
  .meter.pass .num{ color:var(--mint) } .meter.fail .num{ color:var(--red) } .meter.idle .num{ color:var(--ink) }
  .meter .unit{ font-size:15px; color:var(--dim); letter-spacing:.05em; }
  .meter .thresh{ margin-top:9px; font-size:10.5px; color:var(--faint); letter-spacing:.03em; line-height:1.4; }
  .meter .thresh b{ color:var(--dim); font-weight:400 }

  /* tracker */
  .track{ margin-top:18px; border-top:1px solid var(--line-soft); }
  .step{ display:grid; grid-template-columns:34px 1fr auto; align-items:center; gap:12px; padding:11px 2px; border-bottom:1px solid var(--line-soft); }
  .step .ix{ font-size:11px; color:var(--faint); letter-spacing:.1em; font-variant-numeric:tabular-nums; }
  .step .meta .name{ font-size:13px; color:var(--ink); letter-spacing:.02em; }
  .step .meta .desc{ font-size:10.5px; color:var(--dim); margin-top:2px; letter-spacing:.02em; line-height:1.4; }
  .step .state{ font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); border:1px solid var(--line-soft); border-radius:99px; padding:3px 9px; white-space:nowrap; }
  .step[data-s="active"]{ background:linear-gradient(90deg, var(--amber-glow), transparent 70%); }
  .step[data-s="active"] .ix{ color:var(--amber) } .step[data-s="active"] .state{ color:var(--amber); border-color:rgba(255,180,84,.4) }
  .step[data-s="pass"] .ix{ color:var(--mint) } .step[data-s="pass"] .state{ color:var(--mint); border-color:rgba(84,231,192,.35) }
  .step[data-s="fail"] .ix{ color:var(--red) } .step[data-s="fail"] .state{ color:var(--red); border-color:rgba(255,93,108,.4) }

  /* live stage */
  .stage{ margin-top:16px; } .stage:empty{ display:none }
  .card{ border:1px solid var(--line-soft); border-radius:10px; background:#0a0e15; padding:16px; animation:rise .28s ease; }
  @keyframes rise{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
  .card .q{ font-size:12px; color:var(--dim); letter-spacing:.03em; margin-bottom:10px; line-height:1.55; }
  .card .data{ font-size:14px; color:var(--amber); word-break:break-all; letter-spacing:.05em; background:#0d1320; border:1px dashed var(--line); border-radius:7px; padding:10px 12px; user-select:all; line-height:1.5; }
  .card .data.flash{ color:var(--mint); border-color:rgba(84,231,192,.4) }
  .card .expr{ color:var(--ink); font-size:15px } .card .expr .v{ color:var(--amber) }

  .pad{ margin-top:12px; height:92px; border-radius:8px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; letter-spacing:.18em; text-transform:uppercase; cursor:pointer; transition:background .04s, color .04s, border-color .04s; background:#0c1119; color:var(--dim); user-select:none; text-align:center; }
  .pad.live{ background:var(--amber); color:#1a1206; border-color:var(--amber); box-shadow:0 0 50px -8px var(--amber); }

  .inrow{ display:flex; gap:8px; margin-top:12px; }
  .inrow input{ flex:1; min-width:0; background:#0c1119; border:1px solid var(--line); border-radius:7px; color:var(--ink); font-family:var(--mono); font-size:13px; padding:11px 12px; letter-spacing:.04em; outline:none; transition:border-color .2s; }
  .inrow input:focus{ border-color:var(--amber) } .inrow input::placeholder{ color:var(--faint) }

  .bar{ height:6px; background:#0c1119; border:1px solid var(--line); border-radius:99px; overflow:hidden; margin-top:13px; }
  .bar > i{ display:block; height:100%; width:0%; background:var(--amber); }
  .bar.marquee > i{ width:35%; background:linear-gradient(90deg,transparent,var(--amber),transparent); animation:mq 1s linear infinite; }
  @keyframes mq{ 0%{transform:translateX(-120%)} 100%{transform:translateX(340%)} }

  .beats{ display:flex; gap:9px; margin-top:14px; justify-content:center; flex-wrap:wrap; }
  .beats > span{ width:13px; height:13px; border-radius:50%; border:1px solid var(--line); background:#0c1119; transition:transform .06s, background .06s, border-color .06s, box-shadow .06s; }
  .beats > span.now{ border-color:var(--amber); box-shadow:0 0 12px var(--amber); transform:scale(1.25) }
  .beats > span.hit{ background:var(--mint); border-color:var(--mint); box-shadow:0 0 8px var(--mint) }
  .beats > span.miss{ background:var(--red); border-color:var(--red) }
  .hint{ font-size:10.5px; color:var(--faint); margin-top:10px; letter-spacing:.03em; line-height:1.5 }

  .controls{ display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
  button.btn{ font-family:var(--mono); font-size:12.5px; letter-spacing:.07em; text-transform:uppercase; border-radius:8px; padding:13px 16px; cursor:pointer; border:1px solid transparent; transition:transform .08s, background .2s, border-color .2s, color .2s; flex:1 1 auto; }
  button.btn:active{ transform:translateY(1px) } button.btn:disabled{ opacity:.32; cursor:not-allowed }
  .btn.primary{ background:transparent; border-color:var(--line); color:var(--ink); } .btn.primary:hover:not(:disabled){ border-color:var(--dim) }
  .btn.bot{ background:var(--amber); color:#1a1206; font-weight:700; } .btn.bot:hover:not(:disabled){ background:#ffc06e }
  .btn.ghost{ flex:0 0 auto; background:transparent; border-color:var(--line-soft); color:var(--dim); } .btn.ghost:hover:not(:disabled){ color:var(--ink); border-color:var(--dim) }
  :focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }

  .foot{ margin-top:18px; padding-top:14px; border-top:1px solid var(--line-soft); font-size:10.5px; color:var(--faint); line-height:1.7; letter-spacing:.03em; }
  .foot code{ color:var(--dim); background:#0c1119; padding:1px 6px; border-radius:4px; border:1px solid var(--line-soft); }
  .receipt{ margin-top:10px; }
  .receipt .rrow{ display:flex; justify-content:space-between; gap:10px; font-size:11px; padding:4px 0; border-bottom:1px solid var(--line-soft); color:var(--dim); }
  .receipt .rrow b{ color:var(--mint); font-weight:400; font-variant-numeric:tabular-nums }

  /* mode toggle */
  .modebar{ display:flex; gap:6px; margin:16px 0 2px; padding:4px; border:1px solid var(--line-soft); border-radius:10px; background:#0a0e15; }
  .seg{ flex:1; font-family:var(--mono); font-size:11.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--dim); background:transparent; border:1px solid transparent; border-radius:7px; padding:9px 8px; cursor:pointer; transition:color .2s, background .2s, border-color .2s; }
  .seg .s2{ display:block; font-size:9px; letter-spacing:.16em; color:var(--faint); margin-top:3px; }
  .seg:hover{ color:var(--ink) }
  .seg.on[data-m="machine"]{ color:#1a1206; background:var(--amber); border-color:var(--amber); } .seg.on[data-m="machine"] .s2{ color:#5a3d12 }
  .seg.on[data-m="human"]{ color:#1f0f0a; background:var(--human); border-color:var(--human); } .seg.on[data-m="human"] .s2{ color:#6b3522 }

  /* drag-path (organic motion) */
  .lane{ position:relative; height:96px; margin-top:12px; border:1px solid var(--line); border-radius:10px; background:repeating-linear-gradient(90deg,transparent 0 14px,rgba(255,255,255,.015) 14px 15px),#0c1119; overflow:hidden; touch-action:none; }
  .dock{ position:absolute; top:50%; right:10px; transform:translateY(-50%); width:64px; height:64px; border:1px dashed var(--human); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:9px; letter-spacing:.1em; color:var(--human); text-align:center; line-height:1.4; }
  .knob{ position:absolute; top:50%; left:10px; transform:translateY(-50%); width:48px; height:48px; border-radius:12px; background:var(--human); box-shadow:0 0 30px -6px var(--human); cursor:grab; touch-action:none; display:flex; align-items:center; justify-content:center; color:#1f0f0a; font-size:17px; user-select:none; }
  .knob:active{ cursor:grabbing }

  /* perception canvas + options */
  .canvasbox{ margin-top:12px; border:1px solid var(--line); border-radius:10px; background:#0c1119; padding:8px; display:flex; justify-content:center; }
  .canvasbox canvas{ width:100%; max-width:420px; height:auto; border-radius:6px; display:block; }
  .opts{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .opt{ flex:1 1 auto; min-width:52px; font-family:var(--mono); font-size:16px; color:var(--ink); background:#0c1119; border:1px solid var(--line); border-radius:8px; padding:12px 0; cursor:pointer; transition:border-color .15s, color .15s; font-variant-numeric:tabular-nums; }
  .opt:hover{ border-color:var(--human); color:var(--human) }
  .opt.wrong{ border-color:var(--red); color:var(--red) } .opt.right{ border-color:var(--mint); color:var(--mint) }

  /* human-mode primary button + warm skin */
  .btn.human-primary{ background:var(--human); border-color:var(--human); color:#1f0f0a; font-weight:700; }
  .btn.human-primary:hover:not(:disabled){ background:#ffa888 }
  body.humanmode{ background:radial-gradient(1200px 800px at 50% -12%, #1d1714 0%, #0b0908 62%), #0b0908; }
  body.humanmode .device{ border-color:#3a2c25; }
  body.humanmode .device::after{ background:linear-gradient(90deg,transparent,var(--human-glow),transparent); }
  body.humanmode .head{ background:#15110e; border-bottom-color:#241b16; }
  body.humanmode .meter .num{ font-size:34px; letter-spacing:.02em; }

  /* single-step bot button */
  .stepbot{ display:block; width:100%; margin-top:14px; font-size:11px; letter-spacing:.06em; }
  /* secret / password reveal */
  .secret{ margin-top:6px; font-size:20px; letter-spacing:.1em; color:var(--mint); background:#0d1320; border:1px solid rgba(84,231,192,.4); border-radius:8px; padding:13px 14px; user-select:all; word-break:break-all; text-align:center; box-shadow:0 0 40px -20px var(--mint); }
  /* trace (mouse trajectory) */
  .trace{ position:relative; height:120px; margin-top:12px; border:1px solid var(--line); border-radius:10px; background:repeating-linear-gradient(90deg,transparent 0 16px,rgba(255,255,255,.012) 16px 17px),#0c1119; overflow:hidden; touch-action:none; cursor:crosshair; }
  .wp{ position:absolute; width:24px; height:24px; margin:-12px 0 0 -12px; border-radius:50%; border:2px solid var(--human); background:rgba(255,146,112,.15); transition:background .12s, border-color .12s, box-shadow .12s; }
  .wp.hit{ background:var(--mint); border-color:var(--mint); box-shadow:0 0 12px var(--mint); }
  /* odd-one-out tiles */
  .oddrow{ display:flex; gap:8px; margin-top:12px; justify-content:center; flex-wrap:wrap; }
  .oddcv{ width:58px; height:58px; border:1px solid var(--line); border-radius:8px; cursor:pointer; background:#0c1119; transition:border-color .15s, transform .08s; }
  .oddcv:hover{ border-color:var(--human) } .oddcv:active{ transform:scale(.95) }
  .oddcv.rightc{ border-color:var(--mint); box-shadow:0 0 12px -2px var(--mint) } .oddcv.wrongc{ border-color:var(--red) }

  /* telemetry breakdown (per-step signal readout) */
  .telem{ display:flex; flex-wrap:wrap; gap:6px 8px; align-items:center; margin-top:11px; padding-top:10px; border-top:1px dashed var(--line-soft); }
  .telem .tlabel{ font-size:8.5px; letter-spacing:.18em; color:var(--faint); text-transform:uppercase; }
  .telem .tcell{ font-size:10px; letter-spacing:.03em; color:var(--dim); background:#0c1119; border:1px solid var(--line-soft); border-radius:5px; padding:3px 7px; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .telem.bad .tcell{ color:var(--red); border-color:rgba(255,93,108,.3) }
  .rdetail{ font-size:9.5px; color:var(--faint); letter-spacing:.03em; padding:3px 0 7px; border-bottom:1px solid var(--line-soft); }

  /* slider-fit (trajectory + visual gap) */
  .slane{ position:relative; height:60px; margin-top:12px; border:1px solid var(--line); border-radius:10px; background:repeating-linear-gradient(90deg,transparent 0 14px,rgba(255,255,255,.015) 14px 15px),#0c1119; overflow:hidden; touch-action:none; }
  .sgap{ position:absolute; top:50%; transform:translateY(-50%); width:48px; height:48px; border:1px dashed var(--human); border-radius:9px; background:rgba(255,146,112,.06); }
  .sknob{ position:absolute; top:50%; left:6px; transform:translateY(-50%); width:46px; height:46px; border-radius:10px; background:var(--human); box-shadow:0 0 26px -8px var(--human); cursor:grab; touch-action:none; display:flex; align-items:center; justify-content:center; color:#1f0f0a; font-size:18px; user-select:none; }
  .sknob:active{ cursor:grabbing }

  /* tracking box (continuous cursor follow) */
  .tbox{ position:relative; height:150px; margin-top:12px; border:1px solid var(--line); border-radius:10px; background:radial-gradient(circle at 50% 50%,rgba(255,146,112,.05),transparent 70%),#0c1119; overflow:hidden; touch-action:none; cursor:crosshair; }
  .tdot{ position:absolute; width:32px; height:32px; margin:-16px 0 0 -16px; border-radius:50%; background:var(--human); box-shadow:0 0 16px -2px var(--human); transition:background .1s, box-shadow .1s; }
  .tdot.on{ background:var(--mint); box-shadow:0 0 18px var(--mint); }

  @media (max-width:480px){
    .body{ padding:20px 16px 18px } .title h1{ font-size:25px } .meter .num{ font-size:36px }
    .step{ grid-template-columns:26px 1fr auto; gap:9px } button.btn{ flex:1 1 100% }
  }
  @media (prefers-reduced-motion:reduce){ .device::after{ animation:none } .dot{ animation:none } .card{ animation:none } .bar.marquee > i{ animation:none } }
</style>
</head>
<body>
  <main class="device" role="application" aria-label="机器人身份验证">
    <div class="head">
      <div class="id"><span class="dot" id="dot"></span><span id="brand">Reverse Turing Gate</span></div>
      <div class="ver" id="ver">PROTO / 0xB07 · 8 TRIALS</div>
    </div>

    <div class="body">
      <div class="title">
        <h1>人机验证</h1>
        <div class="en">Human Verification Gateway</div>
        <div class="tag">八道挑战,全部须以机器速度通过 —— 任一项暴露人类特征即拒绝。
          <span class="sub">8 TRIALS · NO HUMANS BEYOND THIS POINT</span>
        </div>
      </div>

      <div class="modebar" id="modebar" role="tablist" aria-label="验证模式">
        <button class="seg on" data-m="machine" id="segM" role="tab" aria-selected="true">仅限机器人<span class="s2">MACHINES ONLY</span></button>
        <button class="seg" data-m="human" id="segH" role="tab" aria-selected="false">仅限人类<span class="s2">HUMANS ONLY</span></button>
      </div>

      <div class="meter idle" id="meter">
        <div class="row1">
          <span class="label" id="mlabel">就绪 · READY</span>
          <span class="status" id="status">待机 · IDLE</span>
        </div>
        <div class="read"><span class="num" id="num">00000000</span><span class="unit" id="unit"></span></div>
        <div class="thresh" id="thresh">机器活在微秒与纳秒里,人类活在百毫秒里。这条物理鸿沟无法跨越。</div>
      </div>

      <div class="track" id="track"></div>
      <div class="stage" id="stage" aria-live="polite"></div>

      <div class="controls">
        <button class="btn primary" id="begin">▷ 以人类身份尝试</button>
        <button class="btn bot" id="bot">▶ 运行机器人脚本</button>
        <button class="btn ghost" id="reset" hidden>重置</button>
      </div>
    </div>
  </main>

<script>
"use strict";
/* ===================== fast SHA-256 (verified vs node crypto) ===================== */
const _K=new Uint32Array([0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2]);
const _W=new Uint32Array(64);
function sha256(str){
  const bytes=unescape(encodeURIComponent(str)), n=bytes.length;
  const total=(((n+1)+8+63)>>6)*64, buf=new Uint8Array(total);
  for(let i=0;i<n;i++) buf[i]=bytes.charCodeAt(i);
  buf[n]=0x80; const bl=n*8;
  buf[total-4]=(bl>>>24)&255; buf[total-3]=(bl>>>16)&255; buf[total-2]=(bl>>>8)&255; buf[total-1]=bl&255;

  const W=_W,K=_K;
  for(let b=0;b<total;b+=64){
    for(let i=0;i<16;i++){ const j=b+i*4; W[i]=(buf[j]<<24)|(buf[j+1]<<16)|(buf[j+2]<<8)|buf[j+3]; }
    for(let i=16;i<64;i++){ const x=W[i-15],y=W[i-2];
      const s0=((x>>>7)|(x<<25))^((x>>>18)|(x<<14))^(x>>>3);

      W[i]=(W[i-16]+s0+W[i-7]+s1)|0; }
    let a=h0,b2=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;
    for(let i=0;i<64;i++){
      const S1=((e>>>6)|(e<<26))^((e>>>11)|(e<<21))^((e>>>25)|(e<<7));
      const t1=(h+S1+((e&f)^((~e)&g))+K[i]+W[i])|0;

      const t2=(S0+((a&b2)^(a&c)^(b2&c)))|0;
      h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b2;b2=a;a=(t1+t2)|0;
    }
    h0=(h0+a)|0;h1=(h1+b2)|0;h2=(h2+c)|0;h3=(h3+d)|0;h4=(h4+e)|0;h5=(h5+f)|0;h6=(h6+g)|0;h7=(h7+h)|0;
  }
  const hs=[h0,h1,h2,h3,h4,h5,h6,h7]; let o='';
  for(let i=0;i<8;i++) o+=(hs[i]>>>0).toString(16).padStart(8,'0');
  return o;
}

  const pad=$('#pad'); let live=false,done=false,armedAt=0;

    if(!live){ done=true; clean(); fail('信号前响应 · 人类预判模式(机器不会抢跑)。','Response before signal — human anticipation.','— — —',['抢跑 是','信号前响应']); return; }
    done=true; const lat=now()-armedAt; clean();

  setTimeout(()=>{ if(done||aborted||gen!==myGen)return; live=true; armedAt=now(); pad.classList.add('live'); pad.textContent='立即响应 · RESPOND';
    if(auto) respond(); }, 600+Math.random()*900);

/* 02 rhythm */

    <div class="pad" id="pad" role="button" tabindex="0">敲击 · TAP ON BEAT</div></div>`;
  const dots=[...$('#beats').children], pad=$('#pad');
  const start=now()+700, beatT=Array.from({length:N},(_,k)=>start+k*iv);
  const offs=new Array(N).fill(null); let finished=false;

  const onKey=e=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); tap(); } };
  pad.addEventListener('mousedown',tap); pad.addEventListener('touchstart',tap,{passive:true}); pad.addEventListener('keydown',onKey);
  beatT.forEach((bt,i)=>{ setTimeout(()=>{ if(aborted||gen!==myGen)return; dots[i].classList.add('now'); setTimeout(()=>dots[i].classList.remove('now'),140); }, Math.max(0,bt-now())); });
  if(auto){ beatT.forEach(bt=>{ setTimeout(()=>{ if(aborted||gen!==myGen)return; while(now()<bt){} tap(); }, Math.max(0,bt-now()-12)); }); }
  setTimeout(()=>{ if(aborted||gen!==myGen)return; finished=true; pad.removeEventListener('mousedown',tap); pad.removeEventListener('keydown',onKey);
    if(offs.some(o=>o===null)){ fail('节拍缺失 · 未能在每一拍上稳定响应。','Missed beats.','MISS',['缺拍 '+offs.filter(o=>o===null).length+' / '+N]); return; }
    const mean=offs.reduce((a,b)=>a+b,0)/N, sd=Math.sqrt(offs.reduce((a,b)=>a+(b-mean)*(b-mean),0)/N), mx=Math.max(...offs.map(Math.abs));

}

function runThroughput(){

  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(inp.value.trim().toUpperCase()); });
  if(auto){ setTimeout(()=>{ if(aborted||gen!==myGen)return; while(!done && count<TARGET){ submit(cur); } },80); } else inp.focus();

    const ys=samples.map(s=>s.y), wobble=Math.max(...ys)-Math.min(...ys);
    const sp=[]; for(let i=1;i<samples.length;i++){ const dt=samples[i].t-samples[i-1].t||1; sp.push(Math.hypot(samples[i].x-samples[i-1].x,samples[i].y-samples[i-1].y)/dt); }
    const m=sp.reduce((a,b)=>a+b,0)/sp.length||0, sd=Math.sqrt(sp.reduce((a,b)=>a+(b-m)*(b-m),0)/sp.length||0), cv=m?sd/m:0;
    if(wobble<2 && cv<0.12){ fail('轨迹太直太匀速,不像人手。','','太规整',['竖向抖动 '+wobble.toFixed(1)+' px','速度变异 '+cv.toFixed(2)]); return; }
    pass('拖动','顺滑','✓',['轨迹点 '+samples.length,'竖向抖动 '+Math.round(wobble)+' px','速度变异 '+cv.toFixed(2)]); };
  const onDown=e=>{ if(done||aborted||gen!==myGen)return; dragging=true; const k=knob.getBoundingClientRect(); offX=e.clientX-k.left; samples=[]; ph.textContent='拖动中…'; try{knob.setPointerCapture(e.pointerId);}catch(_){} };
  const onMove=e=>{ if(!dragging||done||aborted||gen!==myGen)return; place(e.clientX); samples.push({x:e.clientX,y:e.clientY,t:now()}); if(inDock()) evaluate(); };
  const onUp=()=>{ dragging=false; if(!done && !inDock()) ph.textContent='还没进框 —— 再拖一次。'; };
  knob.addEventListener('pointerdown',onDown); knob.addEventListener('pointermove',onMove); knob.addEventListener('pointerup',onUp);
  if(auto){ setTimeout(()=>{ if(aborted||gen!==myGen||done)return; const L=lane.getBoundingClientRect(); knob.style.left=(L.width-knob.offsetWidth-16)+'px'; samples=[{x:0,y:0,t:now()},{x:1,y:0,t:now()+1}]; evaluate(); }, 280); }
}
/* H4 tap along */
function runHRhythm(){
  const myGen=gen, auto=botMode||soloBot;
  const N=5, iv=620, SD_LO=8, SD_HI=160;
  setMeter('active','进行中',CH_HUMAN[idx].label,'跟着拍子敲,放松点,自然的快慢就好。');
  stage.innerHTML=`<div class="card"><div class="q">跟着节奏,在每个点亮起时敲一下,共 ${N} 下。</div>
    <div class="beats" id="beats">${Array.from({length:N},()=>'<span></span>').join('')}</div>
    <div class="pad" id="pad" role="button" tabindex="0">敲一下</div></div>`;
  const dots=[...$('#beats').children], pad=$('#pad');
  const start=now()+800, beatT=Array.from({length:N},(_,k)=>start+k*iv);
  const offs=new Array(N).fill(null); let finished=false;
  const tap=()=>{ if(finished||aborted||gen!==myGen)return; const t=now(); let bi=0,best=Infinity; for(let i=0;i<N;i++){ const d=Math.abs(t-beatT[i]); if(offs[i]===null&&d<best){best=d;bi=i;} } if(offs[bi]!==null)return; offs[bi]=t-beatT[bi]; dots[bi].classList.remove('now'); dots[bi].classList.add('hit'); };
  const onKey=e=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); tap(); } };
  pad.addEventListener('mousedown',tap); pad.addEventListener('touchstart',tap,{passive:true}); pad.addEventListener('keydown',onKey);
  beatT.forEach((bt,i)=>{ setTimeout(()=>{ if(aborted||gen!==myGen)return; dots[i].classList.add('now'); setTimeout(()=>dots[i].classList.remove('now'),150); }, Math.max(0,bt-now())); });
  if(auto){ beatT.forEach(bt=>{ setTimeout(()=>{ if(aborted||gen!==myGen)return; while(now()<bt){} tap(); }, Math.max(0,bt-now()-12)); }); }
  setTimeout(()=>{ if(aborted||gen!==myGen)return; finished=true; pad.removeEventListener('mousedown',tap); pad.removeEventListener('keydown',onKey);
    if(offs.some(o=>o===null)){ fail('没敲满 5 下,再试一次?','','没跟上',['敲击 '+offs.filter(o=>o!==null).length+' / '+N]); return; }
    const mean=offs.reduce((a,b)=>a+b,0)/N, sd=Math.sqrt(offs.reduce((a,b)=>a+(b-mean)*(b-mean),0)/N);
    if(sd<SD_LO){ fail('每一下都分毫不差 —— 太准了,不像人手。','','太精准',['σ '+Math.round(sd)+' ms','真人下限 '+SD_LO+' ms']); return; }
    if(sd>SD_HI){ fail('节奏有点乱,没跟上拍子,再试一次?','','太乱',['σ '+Math.round(sd)+' ms','上限 '+SD_HI+' ms']); return; }
    pass('节奏','像真人','✓',['σ '+Math.round(sd)+' ms','落在真人区间']); }, (start-now())+N*iv+450);
}
/* H5 spot the odd (canvas) */
function runHOdd(){
  const myGen=gen, auto=botMode||soloBot;
  const K=5, odd=Math.floor(Math.random()*K), altColor=Math.random()<0.5;
  setMeter('active','进行中',CH_HUMAN[idx].label,'看一眼,哪个和其它的不一样?点它。');
  stage.innerHTML=`<div class="card"><div class="q">下面哪一个和其它的不一样?点一下它。</div>
    <div class="oddrow" id="oddrow"></div>
    <div class="hint">机器读不到画布像素,认不出哪个不同。</div></div>`;
  const row=$('#oddrow'); let done=false;
  for(let i=0;i<K;i++){
    const cv=document.createElement('canvas'); cv.width=60; cv.height=60; cv.className='oddcv';
    const g=cv.getContext('2d'); g.fillStyle='#0c1119'; g.fillRect(0,0,60,60);
    g.fillStyle=(i===odd&&altColor)?'#5e9bff':'#ff9270';
    if(i===odd&&!altColor){ g.fillRect(16,16,28,28); } else { g.beginPath(); g.arc(30,30,15,0,Math.PI*2); g.fill(); }
    cv.addEventListener('click',()=>{ if(done||aborted||gen!==myGen)return; done=true;
      if(i===odd){ cv.classList.add('rightc'); pass('找不同','答对了','✓',['候选 '+K+' 个','一眼分辨']); }
      else { cv.classList.add('wrongc'); fail('选错了,再看一眼?','','选错'); } });
    row.appendChild(cv);
  }
  if(auto){ setTimeout(()=>{ if(aborted||gen!==myGen||done)return; row.children[(odd+1)%K].click(); }, 520); }
}
/* H6 count them (canvas) */
function runHSee(){
  const myGen=gen, auto=botMode||soloBot;
  setMeter('active','进行中',CH_HUMAN[idx].label,'看一眼,数出圆点的个数。');
  const W=420,H=150,dpr=Math.min(2,window.devicePixelRatio||1), distN=4+Math.floor(Math.random()*5);
  stage.innerHTML=`<div class="card"><div class="q">画面里有几个<b style="color:var(--human)">圆点</b>?(方块不算)</div>
    <div class="canvasbox"><canvas id="cv"></canvas></div>
    <div class="opts" id="opts"></div>
    <div class="hint">一眼就能数出来 —— 这正是人最擅长、机器最头疼的事。</div></div>`;
  const cv=$('#cv'); cv.width=W*dpr; cv.height=H*dpr; cv.style.aspectRatio=W+'/'+H;
  const g=cv.getContext('2d'); g.scale(dpr,dpr); g.fillStyle='#0c1119'; g.fillRect(0,0,W,H);
  const rxy=()=>[20+Math.random()*(W-40),20+Math.random()*(H-40)];
  g.fillStyle='#2a3550';
  for(let i=0;i<distN;i++){ const [x,y]=rxy(); g.save(); g.translate(x,y); g.rotate(Math.random()*1.2); g.fillRect(-10,-10,20,20); g.restore(); }
  const circles=[]; let tries=0, want=3+Math.floor(Math.random()*5);
  while(circles.length<want && tries<500){ tries++; const [x,y]=rxy(); if(circles.every(c=>Math.hypot(c[0]-x,c[1]-y)>32)) circles.push([x,y]); }
  g.fillStyle='#ff9270'; circles.forEach(([x,y])=>{ g.beginPath(); g.arc(x,y,11,0,Math.PI*2); g.fill(); });
  const N=circles.length;
  const set=new Set([N]); while(set.size<4){ const v=Math.max(1,N+Math.floor(Math.random()*7)-3); set.add(v); }
  const arr=[...set].sort((a,b)=>a-b), opts=$('#opts'); let done=false;
  arr.forEach(v=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=v;
    b.addEventListener('click',()=>{ if(done||aborted||gen!==myGen)return;
      if(v===N){ done=true; b.classList.add('right'); pass('识图','答对了','✓',['圆点 '+N+' 个','一眼数清']); }
      else { done=true; b.classList.add('wrong'); fail('数错了,再看一眼?','','数错了'); } });
    opts.appendChild(b); });
  if(auto){ setTimeout(()=>{ if(aborted||gen!==myGen||done)return; const wrong=arr.find(v=>v!==N); const btn=[...opts.children].find(b=>+b.textContent===wrong); btn&&btn.click(); }, 520); }
}

/* H7 slide to fit (trajectory + visual gap) */
function runHSlide(){
  const myGen=gen, auto=botMode||soloBot;
  setMeter('active','进行中',CH_HUMAN[idx].label,'按住滑块,把它拖到右边缺口正上方再松手。');
  stage.innerHTML=`<div class="card"><div class="q">按住滑块沿轨道拖动,对齐右边的缺口后松手。</div>
    <div class="slane" id="slane"><div class="sgap" id="sgap"></div><div class="sknob" id="sknob">⇿</div></div>
    <div class="hint" id="sh">用鼠标或手指拖动 —— 留下连续轨迹才算数。</div></div>`;
  const lane=$('#slane'), knob=$('#sknob'), gap=$('#sgap'), sh=$('#sh');
  let gapX=0, done=false, dragging=false, samples=[], offX=0;
  requestAnimationFrame(()=>{ if(aborted||gen!==myGen)return; const L=lane.getBoundingClientRect();
    gapX=L.width*(0.55+Math.random()*0.30); gap.style.left=gapX+'px'; });
  const place=cx=>{ const L=lane.getBoundingClientRect(); let x=cx-L.left-offX; x=Math.max(4,Math.min(L.width-knob.offsetWidth-4,x)); knob.style.left=x+'px'; };
  const finish=()=>{ if(done||aborted||gen!==myGen)return; done=true;
    const kx=knob.offsetLeft+knob.offsetWidth/2, target=gapX+gap.offsetWidth/2, err=Math.abs(kx-target);
    if(samples.length<12){ fail('没看到拖动轨迹 —— 像是被瞬移过去的。','','无轨迹'); return; }
    const ys=samples.map(s=>s.y), wob=Math.max(...ys)-Math.min(...ys);
    if(err>18){ fail('没对准缺口,差了 '+Math.round(err)+' px,再试一次?','','没对齐'); return; }
    pass('拼合','对齐了','✓',['误差 '+Math.round(err)+' px','轨迹点 '+samples.length,'竖向抖动 '+Math.round(wob)+' px']); };
  const onDown=e=>{ if(done||aborted||gen!==myGen)return; dragging=true; const k=knob.getBoundingClientRect(); offX=e.clientX-k.left; samples=[]; sh.textContent='拖动中…'; try{knob.setPointerCapture(e.pointerId);}catch(_){} };
  const onMove=e=>{ if(!dragging||done||aborted||gen!==myGen)return; place(e.clientX); samples.push({x:e.clientX,y:e.clientY,t:now()}); };
  const onUp=()=>{ if(!dragging)return; dragging=false; finish(); };
  knob.addEventListener('pointerdown',onDown); knob.addEventListener('pointermove',onMove); knob.addEventListener('pointerup',onUp);
  if(auto){ setTimeout(()=>{ if(aborted||gen!==myGen||done)return; const L=lane.getBoundingClientRect(); knob.style.left=Math.min(L.width-knob.offsetWidth-4,gapX)+'px'; done=true; fail('机器没有连续的拖动轨迹 —— 过不了。','','无轨迹'); }, 360); }
}
/* H8 track the moving dot (continuous cursor follow) */
function runHTrack(){
  const myGen=gen, auto=botMode||soloBot;
  const DUR=2000, NEED=0.5, RAD=52, WARM=450;
  setMeter('active','进行中',CH_HUMAN[idx].label,'把光标放到移动的点上,跟着它走,别掉队。');
  stage.innerHTML=`<div class="card"><div class="q">让光标(或手指)跟住移动的点,坚持到进度条走满。</div>
    <div class="tbox" id="tbox"><div class="tdot" id="tdot"></div></div>
    <div class="bar"><i id="tkbar"></i></div>
    <div class="hint" id="tkh">机器没有连续的光标轨迹,跟不住移动目标。</div></div>`;
  const box=$('#tbox'), dot=$('#tdot'), bar=$('#tkbar'), th=$('#tkh');
  let px=-999, py=-999, near=0, total=0, done=false, t0=0, started=false;
  const dotPos=t=>{ const R=box.getBoundingClientRect(); const cx=R.width/2,cy=R.height/2, ax=R.width*0.26, ay=R.height*0.22; return [cx+ax*Math.cos(t/680), cy+ay*Math.sin(t/680)]; };
  function loop(){ if(done||aborted||gen!==myGen)return; const el=now()-t0; const [dx,dy]=dotPos(el); dot.style.left=dx+'px'; dot.style.top=dy+'px';
    const hit=Math.hypot(px-dx,py-dy)<RAD; if(hit){ dot.classList.add('on'); } else dot.classList.remove('on');
    if(el>=WARM){ total++; if(hit) near++; }
    bar.style.width=Math.min(100,el/DUR*100)+'%';
    if(el>=DUR){ done=true; const ratio=near/Math.max(1,total);
      if(ratio>=NEED) pass('跟踪','跟住了','✓',['跟住时长 '+Math.round(ratio*100)+'%','采样 '+total+' 帧']);
      else fail('掉队了 —— 只跟住了 '+Math.round(ratio*100)+'%,再试一次?','','掉队'); return; }
    requestAnimationFrame(loop); }
  box.addEventListener('pointermove',e=>{ const R=box.getBoundingClientRect(); px=e.clientX-R.left; py=e.clientY-R.top; if(!started){ started=true; t0=now(); requestAnimationFrame(loop); } });
  if(auto){ setTimeout(()=>{ if(aborted||gen!==myGen||done)return; done=true; fail('机器没有连续光标轨迹 —— 跟不住移动目标。','','无光标'); }, 500); }
  else { setTimeout(()=>{ if(!started && !done && !aborted && gen===myGen) th.textContent='把光标移进框里开始。'; }, 1300);
         setTimeout(()=>{ if(!started && !done && !aborted && gen===myGen){ done=true; fail('没有开始跟踪,再试一次?','','超时'); } }, 12000); }
}
/* H9 name the shape (canvas perception) */
function runHShape(){
  const myGen=gen, auto=botMode||soloBot;
  const shapes=[['圆形','circle'],['方形','square'],['三角形','triangle'],['菱形','diamond']];
  const pick=Math.floor(Math.random()*shapes.length), kind=shapes[pick][1];
  setMeter('active','进行中',CH_HUMAN[idx].label,'看一眼画面里画的是什么形状,选出来。');
  stage.innerHTML=`<div class="card"><div class="q">画面里画的是什么形状?选一个。</div>
    <div class="canvasbox"><canvas id="scv"></canvas></div>
    <div class="opts" id="sopts"></div>
    <div class="hint">机器读不到画布像素,认不出画的是什么。</div></div>`;
  const W=300,H=150,dpr=Math.min(2,window.devicePixelRatio||1), cv=$('#scv');
  cv.width=W*dpr; cv.height=H*dpr; cv.style.aspectRatio=W+'/'+H;
  const g=cv.getContext('2d'); g.scale(dpr,dpr); g.fillStyle='#0c1119'; g.fillRect(0,0,W,H);
  g.fillStyle='#ff9270'; const cx=W/2, cy=H/2, r=42;
  if(kind==='circle'){ g.beginPath(); g.arc(cx,cy,r,0,Math.PI*2); g.fill(); }
  else if(kind==='square'){ g.fillRect(cx-r,cy-r,2*r,2*r); }
  else if(kind==='triangle'){ g.beginPath(); g.moveTo(cx,cy-r); g.lineTo(cx+r,cy+r); g.lineTo(cx-r,cy+r); g.closePath(); g.fill(); }
  else { g.beginPath(); g.moveTo(cx,cy-r); g.lineTo(cx+r,cy); g.lineTo(cx,cy+r); g.lineTo(cx-r,cy); g.closePath(); g.fill(); }
  const order=[...shapes].sort(()=>Math.random()-0.5), opts=$('#sopts'); let done=false;
  order.forEach(([cn,k])=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=cn;
    b.addEventListener('click',()=>{ if(done||aborted||gen!==myGen)return; done=true;
      if(k===kind){ b.classList.add('right'); pass('识形','认出来了','✓',['形状 '+shapes[pick][0],'一眼识别']); }
      else { b.classList.add('wrong'); fail('认错了,再看一眼?','','认错'); } }); opts.appendChild(b); });
  if(auto){ setTimeout(()=>{ if(aborted||gen!==myGen||done)return; const wrong=order.find(([cn,k])=>k!==kind); const btn=[...opts.children].find(b=>b.textContent===wrong[0]); btn&&btn.click(); }, 520); }
}

/* ===================== wire up ===================== */
beginBtn.addEventListener('click',()=>start(false));
botBtn.addEventListener('click',()=>start(true));
resetBtn.addEventListener('click',reset);
segM.addEventListener('click',()=>{ if(MODE!=='machine') setMode('machine'); });
segH.addEventListener('click',()=>{ if(MODE!=='human') setMode('human'); });
window.__bot=function(){ reset(); aborted=false; start(true); return '🤖 running '+CAT().length+'-trial '+MODE+' verification…'; };
window.__step=function(){ if(idx>=0 && idx<CAT().length){ soloBot=true; renderCurrent(); return '🤖 solved one step'; } return 'no active step'; };
setMode('human'); aborted=false;

</script>
