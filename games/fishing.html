<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>湖畔钓鱼</title>
<style>
body{margin:0;background:#0a1420;color:#e8ecf4;font-family:"Microsoft YaHei",system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;user-select:none}
a.back{align-self:flex-start;color:#98a3b8;text-decoration:none;font-size:13px}
h1{font-size:20px;letter-spacing:3px;margin:6px 0}
.hud{display:flex;gap:16px;font-size:14px;margin-bottom:8px}
.hud b{color:#ffd24d}
canvas{background:#5a7fa8;border:4px solid #000;outline:2px solid #555;max-width:96vw;
  image-rendering:pixelated;touch-action:manipulation}
.tip{color:#98a3b8;font-size:12px;margin-top:10px;text-align:center;line-height:1.8}
#log{margin-top:8px;font-size:13px;color:#cfe3ff;min-height:44px;text-align:center;line-height:1.7}
#over{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;z-index:9}
.card{background:#242830;border:2px solid #555;border-radius:12px;padding:26px;text-align:center;max-width:92vw}
.card button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;padding:11px 20px;font-size:14px;background:#2f6b3a;color:#fff;margin:10px 6px 0}
.card .gray{background:#3a4050}
.book{text-align:left;font-size:13px;background:#1a1c22;border-radius:8px;padding:10px 14px;margin-top:10px;line-height:1.9}
</style>
</head>
<body>
<a class="back" href="../arcade.html">← 返回游戏厅</a>
<h1>🎣 湖畔钓鱼</h1>
<div class="hud">⏱ 剩余 <b id="tm">60</b>s　💰 金币 <b id="gold">0</b>　🐟 收获 <b id="fish">0</b>　🏆 最佳 <b id="hi">0</b></div>
<canvas id="cv" width="560" height="380"></canvas>
<div id="log">按空格 / 点击画面 抛竿</div>
<div class="tip">🎯 <b>甩竿 → 等 → 鱼咬钩时果断收线</b>　·　浮漂剧烈晃动时按空格 = 完美收线<br>不同的水域和运气会钓到不同东西……</div>
<div id="over"><div class="card"><h2>🎣 时间到！</h2>
  <p id="ovS"></p>
  <div class="book" id="ovBook"></div>
  <button onclick="init()">🔁 再钓 60 秒</button>
  <button class="gray" onclick="location.href='../arcade.html'">返回</button>
</div></div>
<script>
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
const W=cv.width,H=cv.height,WATER_Y=180;
const CATCH={
  tadpole:{name:'蝌蚪',ic:'🐛',gold:2,weight:20},
  cod:{name:'鳕鱼',ic:'🐟',gold:8,weight:30},
  salmon:{name:'鲑鱼',ic:'🐠',gold:15,weight:22},
  puffer:{name:'河豚',ic:'🐡',gold:20,weight:10},
  boot:{name:'旧靴子',ic:'👢',gold:-2,weight:8},
  bottle:{name:'瓶子信',ic:'🧴',gold:5,weight:5},
  saddle:{name:'鞍',ic:'🪖',gold:40,weight:3},
  namePlate:{name:'命名牌',ic:'🏷',gold:25,weight:4},
  treasure:{name:'附魔书',ic:'📕',gold:60,weight:2},
};
const CATCH_KEYS=Object.keys(CATCH);
const TOTAL_W=CATCH_KEYS.reduce((a,k)=>a+CATCH[k].weight,0);
let state,time,gold,fishCnt,hi=+(localStorage.getItem('mc_fish_hi')||0),
    log,rod,boat,book,t,bobble;
document.getElementById('hi').textContent=hi;
function init(){
  state='idle';time=60;gold=0;fishCnt=0;book={};t=0;bobble=0;
  rod={x:110,y:150,tipX:180,tipY:130,floatX:340,floatY:WATER_Y+6,castT:0};
  boat={x:80,y:150};
  hud();say('按空格 / 点击画面 抛竿');
  document.getElementById('over').style.display='none';
  clearInterval(timerH);timerH=setInterval(()=>{time--;hud();if(time<=0)end();},1000);
}
function hud(){
  document.getElementById('tm').textContent=Math.max(0,time);
  document.getElementById('gold').textContent=gold;
  document.getElementById('fish').textContent=fishCnt;
}
function say(t){document.getElementById('log').innerHTML=t;}
let timerH,waitT,perfectWin;
function cast(){
  if(time<=0)return;
  if(state==='idle'){
    state='casting';
    rod.castT=0;
    say('🎣 甩竿中……');
  }else if(state==='waiting'){
    say('❌ 鱼还没上钩！扯断了鱼线，什么都没钓到');
    reelIn(null);
  }else if(state==='biting'){
    if(perfectWin){
      const p=pickCatch();
      say('✨ 完美收线！钓到了 <b>'+p.ic+' '+p.name+'</b>　'+(p.gold>=0?'+'+p.gold:p.gold)+' 💰');
      gold=Math.max(0,gold+p.gold);
      if(['tadpole','cod','salmon','puffer'].includes(p.key))fishCnt++;
      book[p.key]=(book[p.key]||0)+1;
    }else{
      say('⌛ 早了/晚了，鱼跑了');
    }
    reelIn(null);
  }
}
function pickCatch(){
  let r=Math.random()*TOTAL_W;
  for(const k of CATCH_KEYS){r-=CATCH[k].weight;if(r<=0)return Object.assign({key:k},CATCH[k]);}
  return Object.assign({key:'cod'},CATCH.cod);
}
function reelIn(){state='idle';hud();}
function step(){
  requestAnimationFrame(step);
  t++;
  if(state==='casting'){
    rod.castT+=1/40;
    rod.floatX=180+(340-180)*Math.min(1,rod.castT);
    if(rod.castT>=1){state='waiting';
      waitT=1.5+Math.random()*4;
      say('🌊 浮漂稳定了，耐心等待……');}
  }
  if(state==='waiting'){
    waitT-=1/60;
    if(waitT<=0){state='biting';perfectWin=false;bobble=0;
      say('❗ <b style="color:#ffd24d">鱼咬钩了！立刻按空格</b>');
      setTimeout(()=>{if(state==='biting'){reelIn();say('💤 反应太慢，鱼跑了');}},1400);}
  }
  if(state==='biting'){
    bobble++;
    // 完美窗口：进入 biting 后 200~700ms
    perfectWin=(bobble>=12&&bobble<=42);
  }
  draw();
}
function draw(){
  // 天空
  cx.fillStyle='#7ec8ff';cx.fillRect(0,0,W,WATER_Y);
  // 太阳
  cx.fillStyle='#fff2b0';cx.beginPath();cx.arc(W-70,60,26,0,Math.PI*2);cx.fill();
  // 远山
  cx.fillStyle='#3a5a6a';cx.beginPath();
  cx.moveTo(0,WATER_Y);cx.lineTo(120,110);cx.lineTo(220,140);cx.lineTo(340,100);cx.lineTo(460,140);cx.lineTo(W,120);cx.lineTo(W,WATER_Y);cx.fill();
  // 水
  cx.fillStyle='#3d76a8';cx.fillRect(0,WATER_Y,W,H-WATER_Y);
  // 水波
  cx.strokeStyle='rgba(255,255,255,.14)';cx.lineWidth=1.4;
  for(let y=WATER_Y+10;y<H;y+=14){cx.beginPath();
    for(let x=0;x<W;x+=6)cx.lineTo(x,y+Math.sin((x+t)*.1)*2);cx.stroke();}
  // 木船
  cx.fillStyle='#6b4a2b';cx.beginPath();
  cx.moveTo(boat.x-40,WATER_Y-6);cx.lineTo(boat.x+40,WATER_Y-6);
  cx.lineTo(boat.x+28,WATER_Y+12);cx.lineTo(boat.x-28,WATER_Y+12);cx.closePath();cx.fill();
  cx.fillStyle='#8a5f3a';cx.fillRect(boat.x-40,WATER_Y-9,80,4);
  // 玩家
  cx.fillStyle='#3d6aa8';cx.fillRect(boat.x-8,rod.y-30,16,26);
  cx.fillStyle='#c9a678';cx.fillRect(boat.x-8,rod.y-42,16,14);
  cx.fillStyle='#111';cx.fillRect(boat.x-4,rod.y-36,3,3);cx.fillRect(boat.x+1,rod.y-36,3,3);
  // 鱼竿
  cx.strokeStyle='#8a5f3a';cx.lineWidth=3;cx.beginPath();
  cx.moveTo(boat.x+6,rod.y-30);cx.lineTo(rod.tipX,rod.tipY);cx.stroke();
  // 鱼线
  cx.strokeStyle='rgba(255,255,255,.75)';cx.lineWidth=1;cx.beginPath();
  cx.moveTo(rod.tipX,rod.tipY);
  const bobY=WATER_Y+6+(state==='biting'?Math.sin(bobble*.7)*5:Math.sin(t*.05)*2);
  cx.lineTo(rod.floatX,bobY);cx.stroke();
  // 浮漂
  cx.fillStyle='#c43c3c';cx.fillRect(rod.floatX-4,bobY-6,8,10);
  cx.fillStyle='#f0f0f0';cx.fillRect(rod.floatX-4,bobY-6,8,4);
  if(state==='biting'){
    // 水花
    cx.strokeStyle='#fff';cx.lineWidth=2;cx.beginPath();
    for(let i=0;i<4;i++){const a=Math.random()*Math.PI*2;cx.moveTo(rod.floatX,bobY);
      cx.lineTo(rod.floatX+Math.cos(a)*10,bobY+Math.sin(a)*10);}cx.stroke();
    if(perfectWin){
      cx.fillStyle='#ffd24d';cx.font='bold 16px sans-serif';cx.textAlign='center';
      cx.fillText('▼ 现在！',rod.floatX,bobY-16);
    }
  }
  // 底部石头 / 海草
  cx.fillStyle='#3a5c3a';
  for(let i=0;i<10;i++){const x=(i*57+t)%W;cx.fillRect(x,H-8,4,8);cx.fillRect(x-4,H-4,4,4);}
}
document.addEventListener('keydown',e=>{if(e.code==='Space'){cast();e.preventDefault();}});
cv.addEventListener('mousedown',cast);
cv.addEventListener('touchstart',e=>{e.preventDefault();cast();},{passive:false});
function end(){
  clearInterval(timerH);
  if(gold>hi){hi=gold;localStorage.setItem('mc_fish_hi',hi);document.getElementById('hi').textContent=hi;}
  document.getElementById('ovS').innerHTML='本局钓获鱼 <b>'+fishCnt+'</b> 条 · 累计金币 <b>'+gold+'</b>'+(gold>=hi?'（🏆 新纪录！）':'');
  const arr=Object.keys(book).map(k=>CATCH[k].ic+' '+CATCH[k].name+' ×'+book[k]);
  document.getElementById('ovBook').innerHTML='<b>📖 收获图鉴：</b><br>'+(arr.join('　')||'（空手而归……）');
  document.getElementById('over').style.display='flex';
}
init();step();
</script>
</body>
</html>
