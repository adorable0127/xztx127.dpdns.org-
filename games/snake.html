<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇 · 小游戏厅</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#14161a;color:#e8e6e0;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:16px}
  #backBtn{position:fixed;top:16px;left:16px;padding:8px 16px;border:none;border-radius:8px;background:#5ed47a;color:#0a1f10;font-weight:700;font-size:13px;cursor:pointer;z-index:10}
  #backBtn:hover{opacity:.85}
  h1{font-size:22px;color:#5ed47a}
  .hud{display:flex;gap:24px;font-size:15px}.hud b{color:#5ed47a}
  .wrap{position:relative;background:#1d2026;border-radius:12px;padding:12px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  canvas{display:block;background:#0c0d10;border-radius:6px;image-rendering:pixelated}
  .overlay{position:absolute;inset:12px;background:rgba(12,13,16,.9);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px}
  .overlay.hide{display:none}.overlay h2{font-size:22px}.overlay p{font-size:13px;color:#8a8d94;max-width:240px;line-height:1.7}
  .btn{padding:11px 22px;border:none;border-radius:8px;background:#5ed47a;color:#0a1f10;font-weight:700;font-size:15px;cursor:pointer}.btn:hover{opacity:.85}
  .hint{font-size:12px;color:#8a8d94}
</style>
</head>
<body>
<button id="backBtn" onclick="location.href='../arcade.html'">← 返回游戏厅</button>
<h1>🐍 贪吃蛇</h1>
<div class="hud"><span>分数 <b id="score">0</b></span><span>最高 <b id="best">0</b></span></div>
<div class="wrap">
  <canvas id="cv" width="400" height="400"></canvas>
  <div class="overlay" id="overlay">
    <h2 id="ovTitle">贪吃蛇</h2>
    <p id="ovText">方向键 / WASD 控制移动，吃到食物变长。撞墙或撞自己就结束。</p>
    <button class="btn" id="startBtn">开始游戏</button>
  </div>
</div>
<div class="hint">方向键 / WASD 移动 · 空格暂停</div>
<script>
(function(){
  const N=20,SZ=20,cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  const overlay=document.getElementById('overlay'),ovTitle=document.getElementById('ovTitle'),ovText=document.getElementById('ovText'),startBtn=document.getElementById('startBtn');
  let snake,dir,nextDir,food,score,best=0,timer,paused,running=false,speed;
  function reset(){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dir={x:1,y:0};nextDir={x:1,y:0};score=0;speed=130;paused=false;placeFood();scoreEl.textContent=0;}
  function placeFood(){do{food={x:Math.random()*N|0,y:Math.random()*N|0};}while(snake.some(s=>s.x===food.x&&s.y===food.y));}
  function step(){if(paused)return;dir=nextDir;const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=N||head.y<0||head.y>=N||snake.some(s=>s.x===head.x&&s.y===head.y)){return end();}
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){score+=10;scoreEl.textContent=score;placeFood();if(speed>60)speed-=2;clearInterval(timer);timer=setInterval(step,speed);}
    else snake.pop();
    draw();}
  function draw(){ctx.fillStyle='#0c0d10';ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle='#e8543f';rr(food.x*SZ+3,food.y*SZ+3,SZ-6,SZ-6,4);
    snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#7ee895':'#5ed47a';rr(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2,4);});}
  function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.fill();}
  function start(){reset();overlay.classList.add('hide');running=true;clearInterval(timer);timer=setInterval(step,speed);draw();}
  function end(){running=false;clearInterval(timer);best=Math.max(best,score);bestEl.textContent=best;ovTitle.textContent='游戏结束';ovText.textContent='得分 '+score+'，再来一局？';startBtn.textContent='重新开始';overlay.classList.remove('hide');}
  document.addEventListener('keydown',e=>{
    const k=e.code;
    if(k==='Space'){e.preventDefault();if(running){paused=!paused;}return;}
    if(!running)return;
    if((k==='ArrowUp'||k==='KeyW')&&dir.y===0)nextDir={x:0,y:-1};
    else if((k==='ArrowDown'||k==='KeyS')&&dir.y===0)nextDir={x:0,y:1};
    else if((k==='ArrowLeft'||k==='KeyA')&&dir.x===0)nextDir={x:-1,y:0};
    else if((k==='ArrowRight'||k==='KeyD')&&dir.x===0)nextDir={x:1,y:0};
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k))e.preventDefault();
  });
  startBtn.onclick=start;reset();draw();
})();
</script>
</body>
</html>
