<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 · 小游戏厅</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#14161a;color:#e8e6e0;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;gap:14px}
  #backBtn{position:fixed;top:16px;left:16px;padding:8px 16px;border:none;border-radius:8px;background:#f2a93b;color:#1a1306;font-weight:700;font-size:13px;cursor:pointer;z-index:10}
  #backBtn:hover{opacity:.85}
  .top{display:flex;align-items:center;gap:16px}
  h1{font-size:30px;color:#f2a93b}
  .scores{display:flex;gap:10px}
  .sbox{background:#1d2026;border-radius:8px;padding:8px 16px;text-align:center;min-width:80px}
  .sbox .l{font-size:10px;color:#8a8d94;text-transform:uppercase;letter-spacing:.1em}
  .sbox .v{font-size:22px;font-weight:700;color:#f2a93b}
  .board{position:relative;background:#1d2026;border-radius:10px;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:340px;height:340px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .cellbg{background:#26292f;border-radius:6px}
  .tile{position:absolute;width:72.5px;height:72.5px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:30px;transition:left .12s,top .12s;color:#1a1306}
  .overlay{position:absolute;inset:10px;background:rgba(20,22,26,.92);border-radius:8px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
  .overlay.show{display:flex}.overlay h2{font-size:28px;color:#f2a93b}
  .btn{padding:11px 22px;border:none;border-radius:8px;background:#f2a93b;color:#1a1306;font-weight:700;font-size:15px;cursor:pointer}.btn:hover{opacity:.85}
  .hint{font-size:12px;color:#8a8d94}
</style>
</head>
<body>
<button id="backBtn" onclick="location.href='../arcade.html'">← 返回游戏厅</button>
<div class="top">
  <h1>2048</h1>
  <div class="scores">
    <div class="sbox"><div class="l">分数</div><div class="v" id="score">0</div></div>
    <div class="sbox"><div class="l">最高</div><div class="v" id="best">0</div></div>
  </div>
</div>
<div class="board" id="board">
  <div class="overlay" id="overlay"><h2 id="ovTitle">游戏结束</h2><button class="btn" id="restart">再来一局</button></div>
</div>
<div class="hint">方向键 / WASD 滑动合并 · 拼出 2048！</div>
<script>
(function(){
  const N=4,board=document.getElementById('board'),scoreEl=document.getElementById('score'),bestEl=document.getElementById('best');
  const overlay=document.getElementById('overlay'),ovTitle=document.getElementById('ovTitle'),restart=document.getElementById('restart');
  const COLORS={2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
  const GAP=10,PAD=10,CELL=72.5;
  let grid,score,best=0,tiles,won;
  // 背景格
  for(let i=0;i<16;i++){const d=document.createElement('div');d.className='cellbg';board.appendChild(d);}
  function pos(r,c){return{left:PAD+c*(CELL+GAP),top:PAD+r*(CELL+GAP)};}
  function reset(){grid=Array.from({length:N},()=>Array(N).fill(0));score=0;won=false;tiles=new Map();board.querySelectorAll('.tile').forEach(t=>t.remove());overlay.classList.remove('show');add();add();render();scoreEl.textContent=0;}
  function add(){const e=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!grid[r][c])e.push([r,c]);if(!e.length)return;const[r,c]=e[Math.random()*e.length|0];grid[r][c]=Math.random()<.9?2:4;}
  function render(){
    const seen=new Set();
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){const v=grid[r][c];if(!v)continue;const key=r+'-'+c;seen.add(key);let t=tiles.get(key);
      if(!t){t=document.createElement('div');t.className='tile';board.appendChild(t);tiles.set(key,t);}
      const p=pos(r,c);t.style.left=p.left+'px';t.style.top=p.top+'px';t.textContent=v;t.style.background=COLORS[v]||'#3c3a32';t.style.color=v>4?'#f9f6f2':'#1a1306';t.style.fontSize=v>=1000?'22px':v>=100?'26px':'30px';}
    tiles.forEach((t,k)=>{if(!seen.has(k)){t.remove();tiles.delete(k);}});
    scoreEl.textContent=score;if(score>best){best=score;bestEl.textContent=best;}
  }
  function slide(row){let a=row.filter(x=>x);for(let i=0;i<a.length-1;i++)if(a[i]===a[i+1]){a[i]*=2;score+=a[i];if(a[i]===2048)won=true;a.splice(i+1,1);}while(a.length<N)a.push(0);return a;}
  function rotate(g){const o=Array.from({length:N},()=>Array(N).fill(0));for(let r=0;r<N;r++)for(let c=0;c<N;c++)o[c][N-1-r]=g[r][c];return o;}
  function move(dir){
    // dir:0左1上2右3下 → 统一转成“左”
    let g=grid.map(r=>r.slice());for(let i=0;i<dir;i++)g=rotate(g);
    const before=JSON.stringify(g);
    g=g.map(slide);
    if(JSON.stringify(g)===before){return false;}
    for(let i=0;i<(4-dir)%4;i++)g=rotate(g);
    grid=g;return true;
  }
  function full(){return grid.every(r=>r.every(v=>v));}
  function canMove(){if(!full())return true;for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(c<N-1&&grid[r][c]===grid[r][c+1])return true;if(r<N-1&&grid[r][c]===grid[r+1][c])return true;}return false;}
  function handle(dir){if(overlay.classList.contains('show'))return;if(move(dir)){add();render();
    if(won){ovTitle.textContent='🎉 达成 2048！';overlay.classList.add('show');won=false;}
    else if(!canMove()){ovTitle.textContent='游戏结束';overlay.classList.add('show');}}}
  document.addEventListener('keydown',e=>{const m={ArrowLeft:0,KeyA:0,ArrowUp:1,KeyW:1,ArrowRight:2,KeyD:2,ArrowDown:3,KeyS:3};if(e.code in m){e.preventDefault();handle(m[e.code]);}});
  restart.onclick=reset;reset();
})();
</script>
</body>
</html>
