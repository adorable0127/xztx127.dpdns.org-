function bindPunycodeTool() {
  // RFC 3492 解码
  function punyDecodeLabel(input) {
    const base=36, tmin=1, tmax=26, skew=38, damp=700;
    let n=128, i=0, bias=72;
    const output=[];
    const lastDelim = input.lastIndexOf('-');
    if (lastDelim > 0) for (const ch of input.slice(0,lastDelim)) output.push(ch.codePointAt(0));
    let idx = lastDelim > 0 ? lastDelim+1 : 0;
    function adapt(delta, numPoints, firstTime) {
      delta = firstTime ? Math.floor(delta/damp) : delta>>1;
      delta += Math.floor(delta/numPoints);
      let k=0;
      while (delta > ((base-tmin)*tmax)>>1) { delta = Math.floor(delta/(base-tmin)); k += base; }
      return k + Math.floor(((base-tmin+1)*delta)/(delta+skew));
    }
    while (idx < input.length) {
      const oldi = i;
      let w = 1;
      for (let k=base;;k+=base) {
        if (idx >= input.length) throw new Error('Punycode 格式不完整');
        const c = input.charCodeAt(idx++);
        const digit = c-48<10 ? c-22 : c-65<26 ? c-65 : c-97<26 ? c-97 : base;
        if (digit >= base) throw new Error('非法 Punycode 字符');
        i += digit*w;
        const t = k<=bias ? tmin : k>=bias+tmax ? tmax : k-bias;
        if (digit < t) break;
        w *= base - t;
      }
      bias = adapt(i-oldi, output.length+1, oldi===0);
      n += Math.floor(i/(output.length+1));
      i %= output.length+1;
      output.splice(i, 0, n);
      i++;
    }
    return String.fromCodePoint(...output);
  }
  window['puny_encode'] = debounce(function() {
    const d = val('puny_uni').trim(); byId('puny_encErr').textContent='';
    if (!d) { setOut('puny_encOut',''); return; }
    try {
      const u = new URL('http://' + d.replace(/^https?:\/\//,''));
      setOut('puny_encOut', u.hostname);
    } catch(e) { setOut('puny_encOut',''); byId('puny_encErr').textContent='⚠️ 域名格式无效'; }
  });
  window['puny_decode'] = debounce(function() {
    const d = val('puny_code').trim().replace(/^https?:\/\//,'').split('/')[0]; byId('puny_decErr').textContent='';
    if (!d) { setOut('puny_decOut',''); return; }
    try {
      const labels = d.split('.').map(lbl => lbl.toLowerCase().startsWith('xn--') ? punyDecodeLabel(lbl.slice(4)) : lbl);
      setOut('puny_decOut', labels.join('.'));
    } catch(e) { setOut('puny_decOut',''); byId('puny_decErr').textContent='⚠️ '+e.message; }
  });
}

// 数字转中文大写金额
TOOL_BODIES['txt-num2cn'] = `
<div class="card">
  <div class="card-title">💴 数字转人民币大写</div>
  <label class="flabel">金额（最多两位小数，上限 9999 亿）：</label>
  <input class="ipt" id="ncn_input" type="number" step="0.01" placeholder="如 1234.56" oninput="ncn_run()">
  <label class="flabel" style="margin-top:10px;">大写金额：</label>
  <div class="out-box" id="ncn_out" onclick="copyText(this)" style="font-size:1.05rem;"><span class="placeholder">结果将在此显示…</span></div>
  <div class="err-text" id="ncn_err"></div>
</div>`;
function bindNum2CnTool() {
  window['ncn_run'] = debounce(function() {
    const raw = val('ncn_input').trim(); byId('ncn_err').textContent='';
    if (!raw) { setOut('ncn_out',''); return; }
    const num = parseFloat(raw);
    if (isNaN(num) || num < 0) { byId('ncn_err').textContent='⚠️ 请输入非负数字'; setOut('ncn_out',''); return; }
    if (num >= 1e12) { byId('ncn_err').textContent='⚠️ 金额过大（上限 9999 亿）'; setOut('ncn_out',''); return; }
    const D = '零壹贰叁肆伍陆柒捌玖';
    const U = ['','拾','佰','仟'];
    const G = ['','万','亿'];
    const fen = Math.round(num * 100);
    const yuan = Math.floor(fen / 100);
    const jiao = Math.floor(fen / 10) % 10;
    const fenD = fen % 10;
    function section(n) { // 0-9999 -> Chinese, no group unit
      let s = '', zero = false;
      const str = String(n);
      for (let i = 0; i < str.length; i++) {
        const d = +str[i], pos = str.length - 1 - i;
        if (d === 0) { zero = true; continue; }
        if (zero && s) s += '零';
        zero = false;
        s += D[d] + U[pos];
      }
      return s;
    }
    let intPart = '';
    if (yuan === 0) intPart = '零';
    else {
      const groups = [];
      let y = yuan;
      while (y > 0) { groups.unshift(y % 10000); y = Math.floor(y / 10000); }
      let out = '';
      for (let i = 0; i < groups.length; i++) {
        const g = groups[i], gi = groups.length - 1 - i;
        if (g === 0) { if (out && !out.endsWith('零') && i < groups.length - 1) out += '零'; continue; }
        const sec = section(g);
        // 若组首位不足4位且前面有内容需补零（如 1,0005 -> 壹万零伍）
        if (out && g < 1000) out += '零';
        out += sec + G[gi];
      }
      intPart = out.replace(/零+$/,'').replace(/零+/g,'零');
    }
    let result = intPart + '元';
    if (jiao === 0 && fenD === 0) result += '整';
    else {
      if (jiao > 0) result += D[jiao] + '角';
      else if (fenD > 0) result += '零';
      if (fenD > 0) result += D[fenD] + '分';
    }
    if (yuan === 0 && (jiao > 0 || fenD > 0)) {
      result = (jiao > 0 ? D[jiao]+'角' : '') + (fenD > 0 ? D[fenD]+'分' : '');
    }
    setOut('ncn_out', result);
  });
}

  function shuffle(a) { for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  window['shuf_run'] = function(mode) {

  };
}

</div>`;
function bindFractionTool() {
  function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;}
  window['frac_calc'] = debounce(function() {
    const a1=parseInt(val('frac_a1')),a2=parseInt(val('frac_a2')),b1=parseInt(val('frac_b1')),b2=parseInt(val('frac_b2'));
    if ([a1,a2,b1,b2].some(isNaN)) { byId('frac_out').innerHTML='<span class="placeholder">输入两个分数…</span>'; return; }
    if (a2===0||b2===0) { byId('frac_out').innerHTML='<span class="err-text">⚠️ 分母不能为 0</span>'; return; }
    const op = val('frac_op');
    let n, d;
    if (op==='+'){ n=a1*b2+b1*a2; d=a2*b2; }
    else if (op==='−'){ n=a1*b2-b1*a2; d=a2*b2; }
    else if (op==='×'){ n=a1*b1; d=a2*b2; }
    else { if(b1===0){byId('frac_out').innerHTML='<span class="err-text">⚠️ 除数不能为 0</span>';return;} n=a1*b2; d=a2*b1; }
    if (d<0){n=-n;d=-d;}
    const g=gcd(n,d);
    const sn=n/g, sd=d/g;
    let disp = sd===1 ? `${sn}` : `${sn}/${sd}`;
    const whole = Math.trunc(sn/sd), rem = Math.abs(sn%sd);
    let mixed = '';
    if (sd!==1 && Math.abs(sn)>sd) mixed = `　带分数：${whole} ${rem}/${sd}`;
    byId('frac_out').innerHTML = `结果：<b style="font-size:1.15rem;">${disp}</b>${mixed}<br>小数：${(sn/sd).toFixed(6).replace(/0+$/,'').replace(/\.$/,'')}`;
  });
}

  <div class="out-box static" id="prime_out" style="margin-top:14px;"><span class="placeholder">输入一个正整数…</span></div>
</div>`;
function bindPrimeTool() {
  window['prime_calc'] = debounce(function() {
    const raw = val('prime_n').trim();
    const box = byId('prime_out');
    if (!raw) { box.innerHTML='<span class="placeholder">输入一个正整数…</span>'; return; }
    const n = Number(raw);
    if (!Number.isInteger(n)||n<1||n>1e15) { box.innerHTML='<span class="err-text">⚠️ 请输入 1 到 10^15 的整数</span>'; return; }
    if (n===1) { box.innerHTML='1 既不是质数也不是合数'; return; }
    box.innerHTML = '计算中…';
    setTimeout(()=>{
      let m=n; const factors={}; let ops=0; const MAX_OPS=4e7;
      for (let p=2; p*p<=m; p += (p===2?1:2)) {
        while (m%p===0){ factors[p]=(factors[p]||0)+1; m/=p; }
        if (++ops>MAX_OPS) { box.innerHTML='<span class="err-text">⚠️ 数字过大（含大质因数），分解超时</span>'; return; }
      }
      if (m>1) factors[m]=(factors[m]||0)+1;
      const keys=Object.keys(factors);
      const isPrime = keys.length===1 && factors[keys[0]]===1 && Number(keys[0])===n;
      const decomp = keys.map(p=>factors[p]>1?`${p}<sup>${factors[p]}</sup>`:p).join(' × ');
      // 因数个数
      let divCount=1; for(const p of keys) divCount*= (factors[p]+1);
      box.innerHTML = `${n} ${isPrime?'<b style="color:var(--green);">是质数 ✓</b>':'<b>是合数</b>'}<br>质因数分解：${decomp}<br>因数个数：${divCount}`;
    }, 10);
  }, 300);
}

function bindImgRotateTool() {
  let img = null;
  function draw(fromCanvas) {
    const c = byId('irot_canvas');
    if (!fromCanvas) { c.width = img.width; c.height = img.height; c.getContext('2d').drawImage(img, 0, 0); }
  }
  bindDropZone('irot', async file => {
    img = await loadImage(await readFileAsDataURL(file));
    byId('irot_result').style.display = 'block';
    draw(false);
  });
  window['irot_reset'] = function() { if (img) draw(false); };
  window['irot_apply'] = function(op) {
    const c = byId('irot_canvas');
    if (!c.width) return;
    const tmp = document.createElement('canvas');
    const tctx = tmp.getContext('2d');
    if (op==='r90' || op==='l90') {
      tmp.width = c.height; tmp.height = c.width;
      tctx.translate(tmp.width/2, tmp.height/2);
      tctx.rotate((op==='r90'?90:-90) * Math.PI/180);
      tctx.drawImage(c, -c.width/2, -c.height/2);
    } else if (op==='180') {
      tmp.width = c.width; tmp.height = c.height;
      tctx.translate(tmp.width/2, tmp.height/2);
      tctx.rotate(Math.PI);
      tctx.drawImage(c, -c.width/2, -c.height/2);
    } else {
      tmp.width = c.width; tmp.height = c.height;
      if (op==='fh') { tctx.scale(-1,1); tctx.drawImage(c, -c.width, 0); }
      else { tctx.scale(1,-1); tctx.drawImage(c, 0, -c.height); }
    }
    c.width = tmp.width; c.height = tmp.height;
    c.getContext('2d').drawImage(tmp, 0, 0);
  };
  window['irot_download'] = function() {
    const c = byId('irot_canvas');
    if (!c.width) { showToast('请先上传图片','error'); return; }
    c.toBlob(b => downloadBlob(b, 'rotated.png'), 'image/png');
  };

  function render(upto) {
    let s = '';
    const end = Math.min(upto, bytes.length);
    for (let off=0; off<end; off+=16) {
      const line = bytes.slice(off, Math.min(off+16, end));
      const hex = Array.from(line).map(b=>b.toString(16).padStart(2,'0')).join(' ').padEnd(47);
      const asc = Array.from(line).map(b => b>=32&&b<127 ? String.fromCharCode(b) : '.').join('');

    }
    setOut('hexv_out', s);
    shown = end;
    byId('hexv_more').style.display = shown < bytes.length ? 'inline-block' : 'none';
  }
  bindDropZone('hexv', async file => {

TOOL_BODIES['dev-chmod'] = `
<div class="card">
  <div class="card-title">🔒 chmod 权限计算器</div>
  <div class="grid-3" style="margin-top:6px;" id="chmod_grid"></div>
  <div class="grid-2" style="margin-top:12px;">
    <div><label class="flabel">八进制</label><input class="ipt" id="chmod_oct" value="755" maxlength="3" oninput="chmod_fromOct()" style="font-family:var(--mono);"></div>
    <div><label class="flabel">符号表示</label><div class="out-box static" id="chmod_sym" style="font-family:var(--mono);margin:0;">rwxr-xr-x</div></div>
  </div>
  <div class="out-box static" id="chmod_cmd" style="margin-top:12px;font-family:var(--mono);cursor:pointer;" onclick="copyText(this)">chmod 755 file</div>
</div>`;
function bindChmodTool() {
  const ROLES = [['owner','所有者 (u)'],['group','用户组 (g)'],['other','其他人 (o)']];
  const PERMS = [['r','读 (4)'],['w','写 (2)'],['x','执行 (1)']];
  function renderGrid() {
    let h = '';
    for (const [rid, rname] of ROLES) {
      h += `<div class="card" style="margin:0;padding:12px;"><div class="flabel" style="margin-bottom:8px;">${rname}</div>`;
      for (const [pid, pname] of PERMS) {
        h += `<label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:4px;"><input type="checkbox" id="chmod_${rid}_${pid}" onchange="chmod_fromChecks()"> ${pname}</label>`;
      }
      h += '</div>';
    }
    byId('chmod_grid').innerHTML = h;
  }
  function update(oct) {
    const digits = oct.split('').map(Number);
    let sym = '';
    ROLES.forEach(([rid], i) => {
      const d = digits[i];
      const r = !!(d&4), w = !!(d&2), x = !!(d&1);
      byId(`chmod_${rid}_r`).checked = r;
      byId(`chmod_${rid}_w`).checked = w;
      byId(`chmod_${rid}_x`).checked = x;
      sym += (r?'r':'-') + (w?'w':'-') + (x?'x':'-');
    });
    byId('chmod_sym').textContent = sym;
    byId('chmod_cmd').textContent = 'chmod ' + oct + ' file';
    byId('chmod_cmd').dataset.text = 'chmod ' + oct + ' file';
  }
  window['chmod_fromChecks'] = function() {
    let oct = '';
    for (const [rid] of ROLES) {
      let d = 0;
      if (byId(`chmod_${rid}_r`).checked) d += 4;
      if (byId(`chmod_${rid}_w`).checked) d += 2;
      if (byId(`chmod_${rid}_x`).checked) d += 1;
      oct += d;
    }
    setVal('chmod_oct', oct);
    update(oct);
  };
  window['chmod_fromOct'] = debounce(function() {
    const o = val('chmod_oct').trim();
    if (/^[0-7]{3}$/.test(o)) update(o);
  });
  renderGrid();
  update('755');
}

<div class="card">

  <textarea class="ta" id="sqlf_input" style="font-family:var(--mono);" placeholder="select id,name from users where age>18 and city='北京' order by id desc" oninput="sqlf_run()"></textarea>
  <label class="flabel" style="margin-top:10px;">格式化结果：</label>
  <div class="out-box" id="sqlf_out" onclick="copyText(this)" style="white-space:pre;overflow-x:auto;font-family:var(--mono);"><span class="placeholder">结果将在此显示…</span></div>
</div>`;
function bindSqlFormatTool() {
  const NEWLINE_KW = ['SELECT','FROM','WHERE','GROUP BY','HAVING','ORDER BY','LIMIT','OFFSET','UNION ALL','UNION','INSERT INTO','VALUES','UPDATE','SET','DELETE FROM','LEFT JOIN','RIGHT JOIN','INNER JOIN','OUTER JOIN','FULL JOIN','CROSS JOIN','JOIN','ON'];
  const INDENT_KW = ['AND','OR'];
  const OTHER_KW = ['AS','IN','NOT','NULL','IS','LIKE','BETWEEN','EXISTS','CASE','WHEN','THEN','ELSE','END','DISTINCT','ASC','DESC','COUNT','SUM','AVG','MIN','MAX','CREATE TABLE','ALTER TABLE','DROP TABLE','PRIMARY KEY','FOREIGN KEY','DEFAULT'];
  window['sqlf_run'] = debounce(function() {
    let s = val('sqlf_input');
    if (!s.trim()) { setOut('sqlf_out',''); return; }
    // 保护字符串字面量
    const strs = [];
    s = s.replace(/'[^']*'/g, m => { strs.push(m); return `\x00${strs.length-1}\x00`; });
    s = s.replace(/\s+/g, ' ').trim();
    // 大写关键字
    for (const kw of [...NEWLINE_KW, ...INDENT_KW, ...OTHER_KW]) {
      s = s.replace(new RegExp(`\\b${kw.replace(/ /g,'\\s+')}\\b`, 'gi'), kw);
    }
    // 主要子句换行
    for (const kw of NEWLINE_KW) {
      s = s.replace(new RegExp(`\\s*\\b${kw.replace(/ /g,'\\s+')}\\b`, 'g'), '\n' + kw);
    }
    // AND/OR 换行缩进
    for (const kw of INDENT_KW) {
      s = s.replace(new RegExp(`\\s+\\b${kw}\\b`, 'g'), '\n  ' + kw);
    }
    // SELECT 字段逗号后加空格
    s = s.replace(/,(?=\S)/g, ', ');
    // 还原字符串
    s = s.replace(/\x00(\d+)\x00/g, (_, i) => strs[+i]);
    setOut('sqlf_out', s.replace(/^\n/,''));
  });
}

function bindTranslateTool() {
  const COLS = TR_LANGS.map(l => l.key);
  // 每种语言建索引：规范化词条 -> 行号；并记录该语言最长词条长度
  const INDEX = {}, MAXLEN = {};
  const norm = (s, lang) => (lang==='zh'||lang==='wy'||lang==='ja') ? s : s.toLowerCase();
  COLS.forEach((lang, ci) => {
    INDEX[lang] = new Map();
    MAXLEN[lang] = 1;
    TR_DATA.forEach((row, ri) => {
      const k = norm(row[ci], lang);
      if (!INDEX[lang].has(k)) INDEX[lang].set(k, ri);
      if (k.length > MAXLEN[lang]) MAXLEN[lang] = k.length;
    });
  });
  const colOf = lang => COLS.indexOf(lang);

  function detectLang(text) {
    if (/[\u3040-\u30ff]/.test(text)) return 'ja';
    if (/[\uac00-\ud7af]/.test(text)) return 'ko';
    if (/[\u0400-\u04ff]/.test(text)) return 'ru';
    if (/[\u4e00-\u9fff]/.test(text)) return 'zh';
    // 拉丁语系：按词典命中数评分
    const words = text.toLowerCase().split(/[^a-zà-ÿœç']+/).filter(Boolean);
    const scores = { en:0, fr:0, de:0, es:0 };
    for (const w of words) for (const lang of ['en','fr','de','es']) if (INDEX[lang].has(w)) scores[lang]++;
    let best = 'en', bs = -1;
    for (const [l, s] of Object.entries(scores)) if (s > bs) { bs = s; best = l; }
    return best;
  }

  // 分词 + 匹配：返回 [{t:'词', ri:行号|null}]
  function segment(text, lang) {
    const segs = [];
    if (!TR_LANGS.find(l=>l.key===lang).space) {
      // 无空格语言：贪心最长匹配
      let i = 0, pend = '';
      const flush = () => { if (pend) { segs.push({ t: pend, ri: null }); pend = ''; } };
      while (i < text.length) {
        let hit = null;
        const maxL = Math.min(MAXLEN[lang], text.length - i);
        for (let L = maxL; L >= 1; L--) {
          const sub = text.substr(i, L);
          if (INDEX[lang].has(sub)) { hit = { t: sub, ri: INDEX[lang].get(sub) }; i += L; break; }
        }
        if (hit) { flush(); segs.push(hit); }
        else { const ch = text[i++]; if (/[\s，。！？、；：""''（）,.!?;:()]/.test(ch)) { flush(); segs.push({ t: ch, ri: -1 }); } else pend += ch; }
      }
      flush();
    } else {
      // 有空格语言：按词切分，尝试最长 4-gram 短语
      const tokens = text.split(/(\s+|[,.!?;:()，。！？；：]+)/).filter(t => t !== '');
      const words = [];
      tokens.forEach(t => { words.push(t); });
      let i = 0;
      while (i < words.length) {
        const w = words[i];
        if (/^\s+$/.test(w) || /^[,.!?;:()，。！？；：]+$/.test(w)) { segs.push({ t: w, ri: -1 }); i++; continue; }
        let hit = null;
        for (let n = 4; n >= 1; n--) {
          // 取 n 个非空白词组成短语
          const parts = []; let j = i, taken = 0;
          while (j < words.length && taken < n) {
            if (!/^\s+$/.test(words[j]) && !/^[,.!?;:()，。！？；：]+$/.test(words[j])) { parts.push(words[j]); taken++; }
            else if (taken > 0 && /^\s+$/.test(words[j])) { /* 词间空格 */ }
            else break;
            j++;
          }
          if (taken < n) continue;
          const phrase = norm(parts.join(' '), lang);
          if (INDEX[lang].has(phrase)) { hit = { t: parts.join(' '), ri: INDEX[lang].get(phrase), skipTo: j }; break; }
        }
        if (hit) { segs.push(hit); i = hit.skipTo; }
        else { segs.push({ t: w, ri: INDEX[lang].has(norm(w, lang)) ? INDEX[lang].get(norm(w, lang)) : null }); i++; }
      }
    }
    return segs;
  }

  function render(segs, dstLang, mark) {
    const ci = colOf(dstLang);
    const spaced = TR_LANGS.find(l=>l.key===dstLang).space;
    const P_TO_LATIN = {'，':', ','。':'. ','！':'! ','？':'? ','；':'; ','：':': ','、':', ','（':' (','）':') '};
    const P_TO_CJK = {',':'，','.':'。','!':'！','?':'？',';':'；',':':'：','(':'（',')':'）'};
    const parts = [];
    let matched = 0, translatable = 0;
    for (const s of segs) {
      if (s.ri === -1) {
        let p = s.t;
        if (/^\s+$/.test(p)) { if (!spaced) continue; p = ' '; }
        else if (spaced) p = p.split('').map(c => P_TO_LATIN[c] || c).join('');
        else p = p.replace(/\s+/g,'').split('').map(c => P_TO_CJK[c] || c).join('');
        if (p) parts.push(p);
        continue;
      }
      translatable++;
      if (s.ri === null) { parts.push(mark ? '【' + s.t + '】' : s.t); }
      else { matched++; parts.push(TR_DATA[s.ri][ci]); }
    }
    let out = spaced ? parts.join(' ') : parts.join('');
    out = out.replace(/\s+([,.!?;:，。！？；：)])/g, '$1').replace(/([(（])\s+/g, '$1').replace(/\s{2,}/g, ' ').trim();
    return { text: out, matched, translatable };
  }

  // ---------- 在线翻译（可选，联网调用第三方 API） ----------
  const YD_MAP = { zh:'zh-CHS', en:'en', ja:'ja', ko:'ko', fr:'fr', de:'de', es:'es', ru:'ru' }; // wy 不支持
  const MM_MAP = { zh:'zh-CN', en:'en', ja:'ja', ko:'ko', fr:'fr', de:'de', es:'es', ru:'ru' };
  const LB_MAP = { zh:'zh', en:'en', ja:'ja', ko:'ko', fr:'fr', de:'de', es:'es', ru:'ru' };
  const PROVIDER_NAME = { autofree:'免费自动', mymemory:'MyMemory', youdao:'有道智云', libre:'自定义端点' };

  async function sha256Hex(str) {
    const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2,'0')).join('');
  }
  function uuid4() {
    if (crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16); });
  }
  function jsonp(url, timeout) {
    return new Promise((resolve, reject) => {
      const cb = '_trjp_' + Math.random().toString(36).slice(2);
      const s = document.createElement('script');
      const timer = setTimeout(() => { cleanup(); reject(new Error('请求超时（可能被跨域或网络拦截）')); }, timeout || 12000);
      function cleanup() { clearTimeout(timer); try { delete window[cb]; } catch(e) { window[cb] = undefined; } s.remove(); }
      window[cb] = d => { cleanup(); resolve(d); };
      s.onerror = () => { cleanup(); reject(new Error('脚本加载失败（跨域 / 网络 / 该接口不支持 JSONP）')); };
      s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
      document.body.appendChild(s);
    });
  }
  function ydInput(q) { const a = Array.from(q); const n = a.length; return n <= 20 ? q : a.slice(0,10).join('') + n + a.slice(-10).join(''); }

  async function callMyMemory(text, srcKey, dstKey) {
    const sc = srcKey === 'auto' ? MM_MAP[detectLang(text)] : MM_MAP[srcKey];
    const dc = MM_MAP[dstKey];
    if (!sc || !dc) throw new Error('MyMemory 不支持所选语言');
    const email = (val('tr_mm_email') || '').trim();
    let url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + encodeURIComponent(sc + '|' + dc);
    if (email) url += '&de=' + encodeURIComponent(email);
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (String(d.responseStatus) !== '200') throw new Error(d.responseDetails || ('状态 ' + d.responseStatus));
    return d.responseData.translatedText;
  }
  async function callYoudao(text, srcKey, dstKey) {
    const appKey = (val('tr_yd_appkey') || '').trim(), secret = (val('tr_yd_secret') || '').trim();
    if (!appKey || !secret) throw new Error('请先填写有道应用ID和应用密钥');
    const from = srcKey === 'auto' ? 'auto' : (YD_MAP[srcKey] || 'auto');
    const to = YD_MAP[dstKey];
    if (!to) throw new Error('有道不支持所选目标语言');
    const salt = uuid4(), curtime = String(Math.floor(Date.now()/1000));
    const sign = await sha256Hex(appKey + ydInput(text) + salt + curtime + secret);
    const p = new URLSearchParams({ q:text, appKey, salt, sign, signType:'v3', curtime, from, to });
    const d = await jsonp('https://openapi.youdao.com/api?' + p.toString());
    if (d.errorCode && String(d.errorCode) !== '0') throw new Error('有道错误码 ' + d.errorCode + '（50=无效密钥，108/202=签名/密钥错误，401=账户欠费）');
    return (d.translation && d.translation.join(' ')) || '';
  }
  async function callLibre(text, srcKey, dstKey) {
    const url = (val('tr_lb_url') || '').trim(); if (!url) throw new Error('请填写自定义端点 URL');
    const key = (val('tr_lb_key') || '').trim();
    const from = srcKey === 'auto' ? 'auto' : (LB_MAP[srcKey] || 'auto'), to = LB_MAP[dstKey];
    if (!to) throw new Error('该端点不支持所选目标语言');
    const body = { q:text, source:from, target:to, format:'text' }; if (key) body.api_key = key;
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    return d.translatedText || '';
  }
  // Lingva：Google 翻译代理，GET /api/v1/{src}/{tgt}/{text} -> {translation}，无需密钥
  async function callLingva(host, text, srcKey, dstKey) {
    const sc = srcKey === 'auto' ? 'auto' : (LB_MAP[srcKey] || 'auto');
    const tc = LB_MAP[dstKey];
    if (!tc) throw new Error('不支持所选目标语言');
    const url = host + '/api/v1/' + encodeURIComponent(sc) + '/' + encodeURIComponent(tc) + '/' + encodeURIComponent(text);
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.translation) throw new Error(d.error || '无译文返回');
    return d.translation;
  }
  const LINGVA_HOSTS = ['https://lingva.ml', 'https://translate.plausibility.cloud'];
  // 免费自动：依次尝试多个无密钥接口，第一个成功即返回
  async function callAutoFree(text, srcKey, dstKey) {
    const errs = [];
    for (const host of LINGVA_HOSTS) {
      try { return await callLingva(host, text, srcKey, dstKey); }
      catch (e) { errs.push('Lingva(' + host.replace('https://','') + ')：' + e.message); }
    }
    try { return await callMyMemory(text, srcKey, dstKey); }
    catch (e) { errs.push('MyMemory：' + e.message); }
    throw new Error('所有免费接口均失败〔' + errs.join('；') + '〕。多为网络/地区限制或跨域拦截：请改用本地服务器打开本页，或在「自定义端点」填入自建 LibreTranslate/Lingva 实例。');
  }
  function callProvider(provider, text, srcKey, dstKey) {
    if (provider === 'youdao') return callYoudao(text, srcKey, dstKey);
    if (provider === 'libre') return callLibre(text, srcKey, dstKey);
    if (provider === 'mymemory') return callMyMemory(text, srcKey, dstKey);

// =============================================
//  SC Crypto v2 — ported from original tool, IDs prefixed sc_
//  Architecture:
//    password + salt → PBKDF2(N iter) → 33 bytes → [AES key 32B][shift 1B]
//    plaintext → AES-GCM(key, random IV) → base64 → applyShift → applySub
//    Output: iterHex(8) + saltHex(32) + obfuscated ciphertext
//    Shift is NOT stored → derived from password → no backdoor
// =============================================

const SC_CHAR_MAP = {
  'a':'q','b':'z','c':'x','d':'s','e':'w','f':'r','g':'t',
  'h':'y','i':'u','j':'k','k':'j','l':'p','m':'n','n':'m',
  'o':'a','p':'l','q':'e','r':'f','s':'d','t':'g','u':'i',
  'v':'b','w':'c','x':'v','y':'h','z':'o',
  'A':'Q','B':'Z','C':'X','D':'S','E':'W','F':'R','G':'T',
  'H':'Y','I':'U','J':'K','K':'J','L':'P','M':'N','N':'M',
  'O':'A','P':'L','Q':'E','R':'F','S':'D','T':'G','U':'I',
  'V':'B','W':'C','X':'V','Y':'H','Z':'O',
  '0':'5','1':'9','2':'7','3':'8','4':'6',
  '5':'0','6':'4','7':'2','8':'3','9':'1'
};
// Note: substitution and shift both operate ONLY on [A-Za-z0-9] (a clean 62-char permutation).
// The base64 chars + / = are intentionally left untouched so the transforms remain perfectly
// invertible (an earlier design that also remapped + / = collided with shift output and could
// corrupt ciphertext for certain salts/IVs).
const SC_ALNUM = (function(){ const a=[]; for(let c=48;c<=57;c++)a.push(c); for(let c=65;c<=90;c++)a.push(c); for(let c=97;c<=122;c++)a.push(c); return a; })();
const SC_ALNUM_IDX = {}; SC_ALNUM.forEach((c,i)=>{ SC_ALNUM_IDX[c]=i; });
const SC_CHAR_MAP_REV = {};
for (const [k,v] of Object.entries(SC_CHAR_MAP)) SC_CHAR_MAP_REV[v] = k;

function sc_applySub(s) { return s.split('').map(c => SC_CHAR_MAP[c] || c).join(''); }
function sc_reverseSub(s) { return s.split('').map(c => SC_CHAR_MAP_REV[c] || c).join(''); }

function sc_applyShift(s, shift) {
  return s.split('').map(c => {
    const code = c.charCodeAt(0);
    if (code in SC_ALNUM_IDX) return String.fromCharCode(SC_ALNUM[(SC_ALNUM_IDX[code] + shift) % 62]);
    return c;
  }).join('');
}
function sc_reverseShift(s, shift) {
  return s.split('').map(c => {
    const code = c.charCodeAt(0);
    if (code in SC_ALNUM_IDX) return String.fromCharCode(SC_ALNUM[(SC_ALNUM_IDX[code] - shift + 62 * 100) % 62]);
    return c;
  }).join('');
}

function sc_buf2b64(buf) { let s = ''; new Uint8Array(buf).forEach(b => s += String.fromCharCode(b)); return btoa(s); }
function sc_b642buf(b64) { const s = atob(b64), a = new Uint8Array(s.length); for (let i = 0; i < s.length; i++) a[i] = s.charCodeAt(i); return a.buffer; }

async function sc_deriveKey(password, saltBuf, iterations) {
  const baseKey = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']
  );
  const derived = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt: saltBuf, iterations, hash: 'SHA-256' },
    baseKey,
    33 * 8
  );
  const arr = new Uint8Array(derived);
  return {
    aesKey: arr.slice(0, 32).buffer,
    shift: arr[32] % 62
  };
}

async function sc_aesEncrypt(plaintext, keyBuf) {
  const key = await crypto.subtle.importKey('raw', keyBuf, { name: 'AES-GCM' }, false, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintext));
  const out = new Uint8Array(iv.length + enc.byteLength);
  out.set(iv, 0);
  out.set(new Uint8Array(enc), iv.length);
  return sc_buf2b64(out.buffer);
}

async function sc_aesDecrypt(b64, keyBuf) {
  const all = new Uint8Array(sc_b642buf(b64));
  const iv = all.slice(0, 12), data = all.slice(12);
  const key = await crypto.subtle.importKey('raw', keyBuf, { name: 'AES-GCM' }, false, ['decrypt']);
  const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
  return new TextDecoder().decode(dec);
}

function sc_calcStrength(pw) {
  if (!pw) return { score: 0, label: '', color: '' };
  let s = 0;
  if (pw.length >= 6) s++;
  if (pw.length >= 10) s++;
  if (pw.length >= 14) s++;
  if (/[a-z]/.test(pw) && /[A-Z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^a-zA-Z0-9]/.test(pw)) s++;
  if (pw.length >= 20) s++;
  if (s <= 2) return { score: Math.max(s / 7 * 100, 10), label: '⚠️ 弱密码 · 建议至少10位混合字符', color: '#E74C3C' };
  if (s <= 4) return { score: s / 7 * 100, label: '🟡 中等强度 · 可以更长更复杂', color: '#F39C12' };
  if (s <= 5) return { score: s / 7 * 100, label: '🟢 强密码', color: '#43A047' };
  return { score: 100, label: '🛡️ 极强密码 · 暴力破解需数百万年', color: '#00E676' };
}

let sc_failedAttempts = 0;
let sc_lockoutUntil = 0;

function sc_getRateDelay() {
  if (sc_failedAttempts <= 1) return 0;
  const delays = [0, 0, 2000, 5000, 10000, 30000, 60000, 120000];
  return delays[Math.min(sc_failedAttempts, delays.length - 1)];
}
function sc_updateRateLimitUI() {
  const el = byId('sc_rateLimitWarn');
  if (!el) return;
  if (sc_failedAttempts >= 2) {
    el.textContent = `⚠️ 连续失败 ${sc_failedAttempts} 次 · 下次需等 ${sc_getRateDelay() / 1000} 秒（防暴力破解）`;
  } else {
    el.textContent = '';
  }
}

function bindScCryptoTool() {
  window['sc_togglePw'] = function(inputId, btnId) {
    const inp = byId(inputId), btn = byId(btnId);
    if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
    else { inp.type = 'password'; btn.textContent = '👁'; }
  };

  window['sc_onPasswordChange'] = async function() {
    const pw = val('sc_passwordInput');
    const preview = byId('sc_hashPreview');
    const subDisp = byId('sc_subTableDisplay');
    const fill = byId('sc_pwStrengthFill');
    const text = byId('sc_pwStrengthText');

    if (!pw) {
      preview.textContent = 'PBKDF2 派生信息将在此显示…';
      subDisp.innerHTML = '';
      fill.style.width = '0%';
      text.textContent = '';
      return;
    }

    const str = sc_calcStrength(pw);
    fill.style.width = str.score + '%';
    fill.style.background = str.color;
    text.textContent = str.label;
    text.style.color = str.color;

    const quickHash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    preview.textContent = 'PBKDF2 基础密钥指纹: ' + buf2hex(quickHash).substring(0, 32) + '…';

    const pairs = Object.entries(SC_CHAR_MAP).filter(([k]) => /[a-z0-9]/i.test(k)).slice(0, 16);
    subDisp.innerHTML = pairs.map(([k, v]) => `<span class="sub-pair">${k}<span class="arrow">→</span>${v}</span>`).join('');
  };

  window['sc_doEncrypt'] = async function() {
    const pw = val('sc_passwordInput');
    if (!pw) { showToast('请先输入密码！', 'error'); return; }
    const plain = val('sc_plainText').trim();
    if (!plain) { showToast('请输入要加密的内容！', 'error'); return; }

    const btn = byId('sc_btnEncrypt');
    btn.innerHTML = '<span class="spinner"></span> PBKDF2 密钥派生中…'; btn.disabled = true;
    await new Promise(r => setTimeout(r, 50));

    try {
      const iterations = parseInt(val('sc_iterSelect'));

      const salt = crypto.getRandomValues(new Uint8Array(16));
      byId('sc_saltDisplay').textContent = buf2hex(salt.buffer);

      const t0 = performance.now();
      const { aesKey, shift } = await sc_deriveKey(pw, salt.buffer, iterations);
      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      byId('sc_shiftDisplay').textContent = '偏移值: ' + shift + ' · 派生耗时: ' + elapsed + 's';

      btn.innerHTML = '<span class="spinner"></span> AES-GCM 加密中…';
      await new Promise(r => setTimeout(r, 20));

      const aesCipher = await sc_aesEncrypt(plain, aesKey);
      const shifted = sc_applyShift(aesCipher, shift);
      const substituted = sc_applySub(shifted);

      const iterHex = iterations.toString(16).padStart(8, '0');
      const saltHex = buf2hex(salt.buffer);
      const output = iterHex + saltHex + substituted;

      const el = byId('sc_encryptOutput');
      el.dataset.text = output;
      el.innerHTML = output + '<span class="copy-hint">点击复制</span>';
      showToast('✅ 四重加密完成！密码是唯一解密方式', 'success');
    } catch (e) {
      showToast('加密失败: ' + e.message, 'error');
    }

    btn.innerHTML = '🔐 加密'; btn.disabled = false;
  };

  window['sc_doDecrypt'] = async function() {
    const pw = val('sc_decryptPwInput');
    if (!pw) { showToast('❌ 必须输入密码才能解密！', 'error'); return; }

    const input = val('sc_cipherText').trim();
    if (!input) { showToast('请输入要解密的密文！', 'error'); return; }

    const now = Date.now();
    if (now < sc_lockoutUntil) {
      const wait = Math.ceil((sc_lockoutUntil - now) / 1000);
      showToast(`⏳ 请等待 ${wait} 秒后再试（防暴力破解）`, 'error');
      return;
    }

    const btn = byId('sc_btnDecrypt');
    btn.innerHTML = '<span class="spinner"></span> PBKDF2 密钥派生中…'; btn.disabled = true;
    await new Promise(r => setTimeout(r, 50));

    try {
      if (input.length < 42) throw new Error('密文长度不足');

      const iterHex = input.substring(0, 8);
      const saltHex = input.substring(8, 40);
      const obfuscated = input.substring(40);

      const iterations = parseInt(iterHex, 16);
      if (isNaN(iterations) || iterations < 100000 || iterations > 10000000) {
        throw new Error('密文格式异常');
      }

      const saltBuf = hex2buf(saltHex);

      const { aesKey, shift } = await sc_deriveKey(pw, saltBuf, iterations);

      btn.innerHTML = '<span class="spinner"></span> AES-GCM 解密中…';
      await new Promise(r => setTimeout(r, 20));

      const unsubbed = sc_reverseSub(obfuscated);
      const unshifted = sc_reverseShift(unsubbed, shift);
      const plaintext = await sc_aesDecrypt(unshifted, aesKey);

      sc_failedAttempts = 0;
      sc_updateRateLimitUI();

      const el = byId('sc_decryptOutput');
      el.dataset.text = plaintext;
      el.innerHTML = plaintext + '<span class="copy-hint">点击复制</span>';
      showToast('✅ 解密成功！', 'success');
    } catch (e) {
      sc_failedAttempts++;
      const delay = sc_getRateDelay();
      sc_lockoutUntil = Date.now() + delay;
      sc_updateRateLimitUI();
      showToast('❌ 解密失败：密码错误或密文已损坏', 'error');
    }

    btn.innerHTML = '🔑 解密'; btn.disabled = false;
  };
}
